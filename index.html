<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tallinna ühistranspordi kaart</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg: #0a0c10;
    --panel: #12151b;
    --panel-border: #232833;
    --text: #e7eaee;
    --text-dim: #8b93a1;
    --troll: #0060d3;
    --bus: #00e2b6;
    --night: #7a5cff;
    --tram: #ff5f26;
    --accent: #e7eaee;
    --tlt-roh: #278082;
    --glass-tint: rgba(255,255,255,0.06);
    --glass-tint-strong: rgba(255,255,255,0.13);
    --glass-border: rgba(255,255,255,0.32);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 1px rgba(255,255,255,0.22);
    --glass-highlight: rgba(255,255,255,0.5);
    --accent-solid: #278082;
    --night-dim: #423868;
    --popup-dark-bg: rgba(18,21,27,0.55);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #map { position:absolute; inset:0; z-index:0; background: var(--bg); }

  #map.dark-mode .leaflet-tile-pane { filter: brightness(0.95) contrast(1.12) saturate(1.35); }

  /* ================= Global animations ================= */
  @keyframes panelDropIn {
    0% { opacity: 0; transform: translateY(-18px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeUpIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes softPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes ringPing {
    0% { transform: scale(0.9); opacity: 0.55; }
    75%, 100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes dropdownIn {
    0% { opacity: 0; transform: translateY(-8px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes bannerShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  /* Top control panel */
  #panel {
    position:absolute; top:14px; left:14px; right:14px;
    z-index: 1000;
    background: var(--glass-tint);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 12px 16px;
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    gap: 14px;
    font-size: 13px;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
    animation: panelDropIn .55s cubic-bezier(.22,1,.36,1);
  }
  .brand {
    display:flex;
    align-items:center;
    padding-right: 12px;
    border-right: 1px solid var(--glass-border);
    flex: none;
  }
  .brand #logoImg {
    width: 32px;
    height: 32px;
    object-fit: contain;
    display:block;
  }
  .brand .brand-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    white-space: nowrap;
    color: var(--text);
  }
  .field { display:flex; flex-direction:column; gap:3px; }
  .field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
  .field input[type="text"] {
    background: rgba(0,0,0,0.22);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    width: 130px;
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input[type="text"]:focus { border-color: rgba(0,226,182,0.6); background: rgba(0,0,0,0.32); }
  .field input[type="text"]::placeholder { color: #9aa3b0; opacity: 0.7; }

  .types { display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
  .chip {
    display:flex; align-items:center; gap:6px;
    background: var(--glass-tint); border:1px solid var(--glass-border);
    border-radius: 999px; padding: 6px 12px 6px 8px; cursor:pointer;
    user-select:none; font-size:12px; white-space:nowrap;
    transition: border-color .15s ease, opacity .25s ease, background .15s ease, transform .15s ease, box-shadow .25s ease;
    isolation: isolate;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
    animation: fadeUpIn .5s cubic-bezier(.22,1,.36,1) backwards;
  }
  #chipTroll { animation-delay: .04s; }
  #chipTram  { animation-delay: .08s; }
  #chipBus   { animation-delay: .12s; }
  #chipNight { animation-delay: .16s; }
  .chip input { display:none; }
  .chip .dot { width:9px; height:9px; border-radius:50%; flex:none; transition: background .3s ease, box-shadow .3s ease, opacity .3s ease; }
  .chip.off { opacity: 0.35; }
  .chip:hover { background: var(--glass-tint-strong); transform: translateY(-1px); }
  .chip:active { transform: translateY(0) scale(0.96); }

  #chipNight.empty { color: var(--text-dim); pointer-events: none; cursor: not-allowed; }
  #chipNight.empty .dot { background: var(--night-dim) !important; box-shadow: none !important; }

  #showAllBtn {
    background: linear-gradient(135deg, #278082, #1f6567);
    color: #ffffff;
    border: none;
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    text-align: center;
    box-shadow: 0 6px 18px rgba(39,128,130,0.4);
    transition: transform .2s ease, box-shadow .2s ease, background .25s ease;
    animation: fadeUpIn .5s cubic-bezier(.22,1,.36,1) .2s backwards;
  }
  #showAllBtn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(39,128,130,0.55); }
  #showAllBtn:active { transform: translateY(0) scale(0.97); }
  #showAllBtn.trajectory-active {
    background: linear-gradient(135deg, #ff9a3d, #e0631c);
    box-shadow: 0 6px 18px rgba(224,99,28,0.45);
  }
  #showAllBtn.trajectory-active:hover { box-shadow: 0 8px 22px rgba(224,99,28,0.6); }

  #mapModeBtn {
    position: absolute;
    right: 14px;
    bottom: 14px;
    z-index: 1000;
    background: var(--glass-tint);
    color: var(--text);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
    transition: transform .25s cubic-bezier(.22,1,.36,1), background .2s ease, box-shadow .3s ease;
    animation: fadeUpIn .5s cubic-bezier(.22,1,.36,1) .1s backwards;
  }
  #mapModeBtn:hover { background: var(--glass-tint-strong); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.25); }
  #mapModeBtn:active { transform: translateY(0) scale(0.96); }
  #mapModeBtn.switching { animation: mapModeSwitch .4s ease; }
  @keyframes mapModeSwitch {
    0% { transform: scale(1) rotate(0deg); }
    45% { transform: scale(0.9) rotate(8deg); opacity: 0.6; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .spacer { flex: 1 1 auto; }

  #status {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    display:flex; align-items:center; gap:8px;
  }
  #statusDot { width:8px; height:8px; border-radius:50%; background:#555; flex:none; transition: background .2s ease; position: relative; }
  #statusDot::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background: #ff4d4d;
    opacity: 0;
    pointer-events: none;
  }
  #statusDot.ok { background:#ff4d4d; box-shadow: 0 0 6px #ff4d4d; animation: liveBlink 1.4s ease-in-out infinite; }
  #statusDot.ok::after { animation: ringPing 1.8s ease-out infinite; }
  @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  #statusDot.bad { background:#ff4d4d; box-shadow: 0 0 6px #ff4d4d; }
  #statusDot.pending { background:#e8b93f; animation: softPulse 1s ease-in-out infinite; }

  #errorBanner {
    position:absolute; top: 76px; left:14px; z-index:1000;
    background: rgba(120, 30, 30, 0.22);
    border:1px solid rgba(255,120,120,0.4);
    color:#ffd5d5;
    padding:10px 14px;
    border-radius: 16px;
    font-size: 12px;
    max-width: 420px;
    display:none;
    isolation: isolate;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 1px rgba(255,180,180,0.2);
  }
  #errorBanner.show { display:block; animation: fadeUpIn .3s ease, bannerShake .5s ease .3s; }

  /* Vehicle marker */
  .veh-icon { transition: none; }
  .veh-shape {
    width: 22px; height: 22px;
    display:flex; align-items:center; justify-content:center;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)) drop-shadow(0 0 5px rgba(255,255,255,0.18));
  }
  .veh-shape svg { display:block; }
  .veh-label {
    position:absolute;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 700;
    color: #0a0c10;
    background: rgba(231,234,238,0.92);
    padding: 0px 4px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: rgba(18,21,27,0.55);
    color: var(--text);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    isolation: isolate;
    box-shadow: var(--glass-shadow);
  }
  .leaflet-popup-tip { background: rgba(18,21,27,0.75); }
  .leaflet-popup-content { margin: 12px 14px; font-size: 13px; }

  .veh-photo-wrap {
    position: relative;
    width: 220px;
    height: 96px;
    margin: 0 auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    flex: none;
  }
  .veh-photo-glow {
    position: absolute;
    inset: -18px;
    z-index: 0;
    filter: blur(14px);
    pointer-events: none;
  }
  .veh-photo {
    position: relative;
    z-index: 1;
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    -webkit-mask-image: radial-gradient(ellipse 85% 85% at center, #000 92%, transparent 100%);
    mask-image: radial-gradient(ellipse 85% 85% at center, #000 92%, transparent 100%);
  }
  .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; display:flex; align-items:center; gap:7px; white-space: nowrap; }
  .popup-title .dot { width:10px; height:10px; border-radius:50%; flex: none; }
  .popup-row { display:flex; justify-content:space-between; gap: 16px; padding: 2px 0; color: var(--text-dim); font-size: 12px; white-space: nowrap; }
  .popup-row b { color: var(--text); font-weight:600; }

  .veh-line-link {
    cursor: pointer;
    text-decoration: underline dotted;
    text-underline-offset: 3px;
    transition: color .15s ease;
  }
  .veh-line-link:hover { color: #fff; }

  .selected-stop-marker {
    filter: drop-shadow(0 0 7px #ff4d4d) drop-shadow(0 0 2px #ff4d4d);
  }

  /* Stop popup: line list + route info */
  .stop-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .stop-lines { display: flex; flex-wrap: wrap; gap: 6px; max-width: 220px; }
  .line-pill {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px; font-weight: 700;
    color: #ffffff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.35);
    transition: transform .1s ease, filter .15s ease;
  }
  .line-pill:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .line-pill:active { transform: translateY(0) scale(0.95); }
  .stop-empty, .stop-loading { color: var(--text-dim); font-size: 12px; }
  .route-back {
    display: inline-block;
    margin-bottom: 6px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .route-back:hover { color: var(--text); }
  .route-eta { font-size: 12px; color: var(--text); margin-top: 4px; }
  .route-eta b { color: #fff; }

  #etaPanel {
    position: absolute;
    top: 76px; left: 14px;
    z-index: 999;
    background: var(--glass-tint);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text-dim);
    max-width: 260px;
    display: none;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
  }
  #etaPanel.show { display:block; animation: fadeUpIn .3s ease; }
  #etaPanel .eta-line { font-size: 14px; font-weight: 700; color: var(--text); }
  #etaPanel .eta-stop { margin-top: 3px; color: var(--text-dim); }
  #etaPanel .eta-reg-row { margin-top: 1px; font-size: 11px; }
  #etaPanel .eta-times { margin-top: 3px; display: flex; flex-wrap: wrap; gap: 6px; }
  #etaPanel .eta-chip { font-weight: 700; color: var(--text); background: color-mix(in srgb, currentColor 14%, transparent); border: 1px solid color-mix(in srgb, currentColor 22%, transparent); border-radius: 8px; padding: 2px 8px; font-size: 13px; }
  #etaPanel .eta-chip.delayed { color: #ffb84d; }
  #etaPanel .eta-dest { margin-top: 2px; color: var(--text-dim); font-size: 11px; }
  #etaPanel .eta-empty { margin-top: 6px; font-size: 12px; font-weight: 500; color: var(--text-dim); }
  #etaPanel .eta-mins { margin-top: 5px; color: var(--text-dim); font-size: 11px; }

  #secondaryControls { display: contents; }

  @media (max-width: 720px) {
    #panel { top: 8px; left: 8px; right: 8px; padding: 10px; gap: 10px; }
    .field input[type="text"] { width: 100px; }
    #status { width: 100%; order: 10; }

    #secondaryControls {
      display: flex;
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 1000;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    
    #secondaryControls #modelFilterBtn {
      background: var(--popup-dark-bg) !important;
      color: #e7eaee !important;
    }
    body.light-mode #secondaryControls #modelFilterBtn {
      background: rgba(255,255,255,0.75) !important;
      color: var(--text-dim) !important;
    }
    #secondaryControls #modelFilterBtn.active-filter {
      color: var(--tlt-roh) !important;
    }
    #secondaryControls #modelDropdown {
      top: auto;
      bottom: calc(100% + 6px);
    }
  }

  #modelFilterBtn {
    background: var(--glass-tint);
    color: var(--text-dim);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    isolation: isolate;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  #modelFilterBtn:hover { color: var(--text); background: var(--glass-tint-strong); }
  #modelFilterBtn.active-filter { border-color: var(--tlt-roh); color: var(--tlt-roh); }

  #modelDropdown {
    display:block;
    position:absolute;
    top: calc(100% + 6px);
    left:0;
    z-index: 1100;
    background: var(--glass-tint);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    width: 260px;
    max-height: 340px;
    overflow: hidden;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
    opacity: 0;
    transform: translateY(-8px) scale(0.96);
    pointer-events: none;
    visibility: hidden;
    transform-origin: top left;
    transition: opacity .2s ease, transform .25s cubic-bezier(.22,1,.36,1), visibility .25s;
  }
  #modelDropdownList {
    max-height: 340px;
    overflow-y: auto;
    padding: 10px;
    position: relative;
    z-index: 1;
  }
  #modelDropdown.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
    visibility: visible;
    animation: dropdownIn .25s cubic-bezier(.22,1,.36,1);
  }
  #modelDropdown .group-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 8px 0 4px;
  }
  #modelDropdown .group-title:first-child { margin-top: 0; }
  #modelDropdown label {
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 12px;
    padding: 4px 6px;
    margin: 0 -6px;
    cursor: pointer;
    border-radius: 6px;
    transition: background .15s ease, opacity .2s ease, color .2s ease;
  }
  #modelDropdown label:hover { background: var(--glass-tint-strong); }
  #modelDropdown label .model-name { flex: 1 1 auto; }
  #modelDropdown label .model-count {
    flex: none;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    background: color-mix(in srgb, currentColor 14%, transparent);
    border: 1px solid color-mix(in srgb, currentColor 22%, transparent);
    padding: 1px 7px;
    border-radius: 8px;
    min-width: 16px;
    text-align: center;
    transition: background .2s ease, color .2s ease, border-color .2s ease;
  }
  #modelDropdown label.unavailable {
    opacity: 0.4;
    cursor: not-allowed;
    color: var(--text-dim);
  }
  #modelDropdown label.unavailable:hover { background: transparent; }
  #modelDropdown label.unavailable input { cursor: not-allowed; }
  #modelDropdown input { accent-color: var(--accent-solid); }

  /* ================= Liquid glass ================= */
  .chip,
  #modelFilterBtn {
    position: relative;
  }
  #panel::before,
  #mapModeBtn::before,
  #errorBanner::before,
  #etaPanel::before,
  .chip::before,
  #modelFilterBtn::before,
  #modelDropdown::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    backdrop-filter: blur(18px) saturate(180%);
    z-index: -1;
  }
  #panel::after,
  #mapModeBtn::after,
  #errorBanner::after,
  #etaPanel::after,
  .chip::after,
  #modelFilterBtn::after,
  #modelDropdown::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.55) 0%, transparent 32%, transparent 68%, rgba(255,255,255,0.28) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  #panel > * { position: relative; z-index: 1; }
  #mapModeBtn, #errorBanner, #etaPanel, .chip, #modelFilterBtn { isolation: isolate; }

  #modelDropdownList { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.35) transparent; }
  #modelDropdownList::-webkit-scrollbar { width: 7px; }
  #modelDropdownList::-webkit-scrollbar-track { background: transparent; }
  #modelDropdownList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.28); border-radius: 10px; }
  #modelDropdownList::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.45); }

  /* custom liquid-glass checkboxes in the model dropdown */
  #modelDropdown input[type="checkbox"] {
    -webkit-appearance: none; appearance: none;
    width: 17px; height: 17px; flex: none;
    border-radius: 5px;
    border: 1px solid color-mix(in srgb, currentColor 45%, transparent);
    background: color-mix(in srgb, currentColor 12%, transparent);
    cursor: pointer;
    position: relative;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
  }
  #modelDropdown input[type="checkbox"]:hover:not(:disabled) { border-color: color-mix(in srgb, currentColor 75%, transparent); }
  #modelDropdown input[type="checkbox"]:active:not(:disabled) { transform: scale(0.9); }
  #modelDropdown input[type="checkbox"]:checked {
    background: var(--accent-solid);
    border-color: transparent;
    box-shadow: 0 0 8px rgba(39,128,130,0.55), inset 0 1px 1px rgba(255,255,255,0.35);
  }
  #modelDropdown input[type="checkbox"]:checked::after {
    content: "";
    position: absolute; left: 5px; top: 2px;
    width: 4px; height: 8px;
    border: solid #ffffff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  #modelDropdown input[type="checkbox"]:disabled {
    cursor: not-allowed;
    background: color-mix(in srgb, currentColor 5%, transparent);
    border-color: color-mix(in srgb, currentColor 20%, transparent);
  }

  #chipTroll .dot { box-shadow: 0 0 8px var(--troll), 0 0 2px var(--troll); }
  #chipTram  .dot { box-shadow: 0 0 8px var(--tram), 0 0 2px var(--tram); }
  #chipBus   .dot { box-shadow: 0 0 8px var(--bus), 0 0 2px var(--bus); }
  #chipNight .dot { box-shadow: 0 0 8px var(--night), 0 0 2px var(--night); }
  #statusDot.ok { box-shadow: 0 0 10px #ff4d4d, 0 0 3px #ff4d4d; }

  body.light-mode {

    <feGaussianBlur in="noise" stdDeviation="2" result="softNoise"/>
    <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="20" xChannelSelector="R" yChannelSelector="G"/>

</svg>

<div id="map"></div>

<div id="panel">
  <div class="brand">
    <img id="logoImg" src="logo.png" alt="Tallinna ÜT" onerror="this.onerror=null; this.replaceWith(Object.assign(document.createElement('span'), {className:'brand-text', textContent:'Tallinna ÜT'}));">

<button id="mapModeBtn" title="Vaheta kaardirežiimi">🛰️ Satelliitvaade</button>

<script src="vehicle-models.js"></script>
<script>
(function(){

  // ---------- Config ----------
  var OWN_PROXY_URL = 'https://tlt-gps-proxy.oliver-tedvig.workers.dev';

  var GPS_URL = 'https://transport.tallinn.ee/gps.txt';
  var SOURCES = (OWN_PROXY_URL ? [OWN_PROXY_URL] : []).concat([
    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(GPS_URL),
    GPS_URL,
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(GPS_URL),
    'https://corsproxy.io/?url=' + encodeURIComponent(GPS_URL)
  ]);
  var FETCH_TIMEOUT_MS = 4500;
  var SAME_SOURCE_RETRIES = 2;
  var SAME_SOURCE_RETRY_DELAY_MS = 700;
  var POLL_MS = 6000;
  var ANIM_MS = 5500;

  var ZOOM_DETAIL_THRESHOLD = 15;

  var COLORS = { '1': '#0060d3', '2': '#00e2b6', '3': '#ff5f26', '7': '#7a5cff' };
  var TYPE_NAMES = { '1': 'Trollibuss', '2': 'Buss', '3': 'Tramm', '7': 'Ööbuss' };

  // ---------- Sõiduplaani (SIRI) andmed transport.tallinn.ee avaandmetest ----------
  var STOPS_TXT_URL = 'https://transport.tallinn.ee/data/stops.txt';
  var SIRI_DEPARTURES_URL = 'https://transport.tallinn.ee/siri-stop-departures.php';
  var SIRI_STOP_MATCH_METERS = 150;
  var SIRI_SCHEDULE_TTL_MS = 15000;
  function buildProxyList(targetUrl) {
    return [
      'https://r.jina.ai/' + targetUrl,
      'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(targetUrl),
      targetUrl,
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl),
      'https://corsproxy.io/?url=' + encodeURIComponent(targetUrl),
      'https://thingproxy.freeboard.io/fetch/' + targetUrl,
      'https://cors.eu.org/' + targetUrl,
      'https://api.cors.lol/?url=' + encodeURIComponent(targetUrl),
      'https://proxy.cors.sh/' + targetUrl,
      'https://yacdn.org/proxy/' + targetUrl
    ];
  }

  // ---------- Peatused ja liinid (gis.tallinn.ee avaandmed) ----------
  var GIS_BASE = 'https://gis.tallinn.ee/arcgis/rest/services/yhistransport/MapServer';
  var STOPS_LAYER = 0;
  var ROUTE_LAYERS = { troll: 1, tram: 2, bus: 3 };
  var ROUTE_COLORS = { bus: '#00886d', troll: '#003a7f', tram: '#993917', night: '#3a2673' };
  var ROUTE_NAMES = { bus: 'buss', troll: 'troll', tram: 'tramm' };
  var TYPE_TO_MODE = { '1': 'troll', '2': 'bus', '3': 'tram', '7': 'bus' };
  var STOPS_MIN_ZOOM = 15;

  var STOP_STYLES = {
    satellite: { color: 'rgba(255,255,255,0.95)', weight: 1.5, fillColor: '#ffe14d', fillOpacity: 0.9 },
    dark:      { color: 'rgba(255,255,255,0.45)', weight: 1,   fillColor: '#9aa3b0', fillOpacity: 0.55 },
    light:     { color: 'rgba(0,0,0,0.5)',        weight: 1,   fillColor: '#5b6570', fillOpacity: 0.8  }
  };

  // ---------- Mudelite kataloog ----------
  var MODEL_CATALOG = [
    { group: 'Bussid', models: [
      'Solaris Urbino IV 18 CNG', 'Solaris Urbino IV 12 CNG', 'Solaris Urbino IV 12 electric',
      "MAN A40 Lion's City GL NG323", "MAN A78 Lion's City LE EL293", "MAN A21 Lion's City NL283",
      'Volvo 7900 Hybrid', 'BMC Procity II 12 CNG', 'BMC Procity II 18 CNG'
    ]},
    { group: 'Trollid', models: [
      'Škoda 32tr', 'Škoda 33tr', 'Solaris Trollino III 18 AC', 'Solaris Trollino III 12 AC'
    ]},
    { group: 'Trammid', models: [
      'Tatra KT4SU', 'Tatra KT4D', 'Tatra KT6TM', 'Tatra KT4TM', 'Tatra KT4TMR',
      'CAF Urbos AXL', 'PESA Twist 147N'
    ]}
  ];

  var TROLL_SUBSTITUTE_COLOR = '#003474';
  var TROLL_SUBSTITUTE_LABEL = 'Trolli asendus';
  var BUS_MODEL_SET = (function() {
    var s = new Set();
    MODEL_CATALOG.forEach(function(group) {
      if (group.group === 'Bussid') group.models.forEach(function(m) { s.add(m); });
    });
    return s;
  })();
  function isTrollSubstitute(d) {
    return d.type === '1' && BUS_MODEL_SET.has(d.model);
  }

  // ---------- Map setup ----------
  var map = L.map('map', { zoomControl: false, attributionControl: false, preferCanvas: true })
    .setView([59.4372, 24.7454], 12);

  var darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20,
    attribution: '&copy; OpenStreetMap &copy; CARTO &middot; Andmed: Tallinna Transpordiamet (transport.tallinn.ee)'
  });

  var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 20,
    maxNativeZoom: 18,
    attribution: '&copy; Esri &middot; Andmed: Tallinna Transpordiamet (transport.tallinn.ee)'
  });

  var lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20,
    attribution: '&copy; OpenStreetMap &copy; CARTO &middot; Andmed: Tallinna Transpordiamet (transport.tallinn.ee)'
  });

  var markerPane = map.getPane('markerPane');
  var overlayPane = map.getPane('overlayPane');
  var routePane = map.createPane('routePane'); routePane.style.zIndex = 350;
  var stopsPane = map.createPane('stopsPane'); stopsPane.style.zIndex = 410;
  map.on('zoomstart', function() {
    snapAllAnimationsToFinal();
    if (markerPane) markerPane.style.visibility = 'hidden';
    if (overlayPane) overlayPane.style.visibility = 'hidden';
    routePane.style.visibility = 'hidden';
    stopsPane.style.visibility = 'hidden';
  });
  map.on('zoomend', function() {
    if (markerPane) markerPane.style.visibility = 'visible';
    if (overlayPane) overlayPane.style.visibility = 'visible';
    routePane.style.visibility = 'visible';
    stopsPane.style.visibility = 'visible';
    if (map.getZoom() < STOPS_MIN_ZOOM && map.hasLayer(stopsLayer)) {
      map.removeLayer(stopsLayer);
      stopsLayer.clearLayers();
      stopMarkersById = {};
      stopVisualMarkersById = {};
    }
    reapplyAllFilters();
  });
  map.on('moveend', function() {
    reapplyAllFilters();
  });

  // ---------- State ----------
  var vehicles = {};
  var filters = { reg: '', line: '', types: { '1': true, '2': true, '3': true, '7': true }, models: new Set(), modeLock: null };
  var lineLockSaved = null;
  var trajectoryActive = false;
  var routeGen = 0;
  var selectedStopMarker = null;
  var trajectoryLineNr = null;
  var selectedVehicleReg = null;
  var SELECTED_VEHICLE_COLOR = '#ff4d4d';

  var liveScheduleStops = null;
  var liveScheduleFullStops = null;
  var liveScheduleIdx = 0;
  var liveScheduleLastMinutes = -Infinity;
  var liveScheduleCtx = null;
  var liveScheduleTopUpBusy = false;
  var liveScheduleRetryTimer = null;
  var TERMINUS_RETRY_INTERVAL_MS = 1000;
  var TERMINUS_RETRY_MAX_MS = 15000;
  var EMPTY_RETRY_INTERVAL_MS = 5000;
  var STOP_CAP = 40;
  var workingSourceIndex = 0;

  // ---------- Peatused ja liinid ----------
  var stopsRenderer = L.canvas({ pane: 'stopsPane', padding: 0.5 });
  var stopsLayer = L.layerGroup();
  var stopMarkersById = {};
  var stopVisualMarkersById = {};
  var currentStopModeKey = 'dark';
  var routeLayer = L.layerGroup().addTo(map);
  var stopsFetchToken = 0;

  function haversineMeters(lat1, lon1, lat2, lon2) {
    var R = 6371000, rad = Math.PI / 180;
    var dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  async function arcgisFetch(layer, params) {
    var qs = Object.keys(params).map(function(k) { return k + '=' + encodeURIComponent(params[k]); }).join('&');
    var res = await fetchWithTimeout(GIS_BASE + '/' + layer + '/query?' + qs, 9000);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function stopMatchesTrajectory(officialLines, lat, lon) {
    if (!trajectoryActive || !trajectoryLineNr) return true;
    if (!officialLines || !officialLines.length) return false;
    var want = trajectoryLineNr.toUpperCase();
    var lineListed = false;
    for (var i = 0; i < officialLines.length; i++) {
      if (officialLines[i].toUpperCase() === want) { lineListed = true; break; }
    }
    if (!lineListed) return false;
    if (currentRouteGeom && currentRouteGeom.length && typeof lat === 'number' && typeof lon === 'number') {
      var proj = projectPointToRoute(lat, lon, currentRouteGeom);
      if (proj.dist > 70) return false;
    }
    return true;
  }

  function applyStopTrajectoryFilter() {
    for (var id in stopVisualMarkersById) {
      var visual = stopVisualMarkersById[id];
      var hit = stopMarkersById[id];
      if (!hit) continue;
      var ll = hit.getLatLng();
      var match = stopMatchesTrajectory(hit.officialLines, ll.lat, ll.lng);
      var onMap = stopsLayer.hasLayer(visual);
      if (match && !onMap) { stopsLayer.addLayer(visual); stopsLayer.addLayer(hit); }
      if (!match && onMap) { stopsLayer.removeLayer(visual); stopsLayer.removeLayer(hit); }
    }
  }

  function refreshStopsForViewport() {
    if (map.getZoom() < STOPS_MIN_ZOOM) {
      if (map.hasLayer(stopsLayer)) map.removeLayer(stopsLayer);
      stopsLayer.clearLayers();
      stopMarkersById = {};
      stopVisualMarkersById = {};
      return;
    }
    if (!map.hasLayer(stopsLayer)) stopsLayer.addTo(map);
    var b = map.getBounds();
    var bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].join(',');
    var myToken = ++stopsFetchToken;
    arcgisFetch(STOPS_LAYER, {
      geometry: bbox, geometryType: 'esriGeometryEnvelope', inSR: 4326,
      spatialRel: 'esriSpatialRelIntersects',
      outFields: 'objectid,nimetus,liini_nr', returnGeometry: true, outSR: 4326, f: 'geojson'
    }).then(function(gj) {
      if (myToken !== stopsFetchToken || !gj || !gj.features) return;
      gj.features.forEach(function(f) {
        var id = f.properties.objectid;
        if (stopMarkersById[id] || !f.geometry) return;
        var lon = f.geometry.coordinates[0], lat = f.geometry.coordinates[1];
        var name = f.properties.nimetus || 'Peatus';
        var officialLines = (f.properties.liini_nr || '').split(',')
          .map(function(s) { return s.trim(); }).filter(Boolean);
        var style = STOP_STYLES[currentStopModeKey] || STOP_STYLES.dark;

        var visual = L.circleMarker([lat, lon], {
          renderer: stopsRenderer,
          radius: 4, weight: style.weight,
          color: style.color,
          fillColor: style.fillColor, fillOpacity: style.fillOpacity,
          interactive: false
        });
        stopVisualMarkersById[id] = visual;

        var hit = L.circleMarker([lat, lon], {
          renderer: stopsRenderer,
          radius: 14, weight: 0,
          color: 'transparent', opacity: 0,
          fillColor: '#000', fillOpacity: 0.001
        });
        hit.bindPopup('<div class="stop-title">' + escapeHtml(name) + '</div><div class="stop-loading">Laen liine…</div>', { closeButton: false, minWidth: 200, maxWidth: 280, autoPanPadding: [20, 20] });
        hit.stopObjectId = id;
        hit.officialLines = officialLines;
        hit.on('popupopen', function() { openStopPopup(hit, lat, lon, name); keepPopupClearOfEtaPanel(hit); });
        stopMarkersById[id] = hit;
        if (stopMatchesTrajectory(officialLines, lat, lon)) {
          visual.addTo(stopsLayer);
          hit.addTo(stopsLayer);
        }
      });
    }).catch(function() { });
  }

  function updateStopsStyleForMode(modeKey) {
    currentStopModeKey = modeKey;
    var style = STOP_STYLES[modeKey] || STOP_STYLES.dark;
    for (var id in stopVisualMarkersById) {
      stopVisualMarkersById[id].setStyle({
        weight: style.weight,
        color: style.color,
        fillColor: style.fillColor,
        fillOpacity: style.fillOpacity
      });
    }
  }

  var stopsRefreshTimer = null;
  function scheduleStopsRefresh() {
    clearTimeout(stopsRefreshTimer);
    stopsRefreshTimer = setTimeout(refreshStopsForViewport, 120);
  }

  var stopLineCache = {};

  function openStopPopup(marker, lat, lon, name) {
    var key = lat.toFixed(5) + ',' + lon.toFixed(5);
    if (stopLineCache[key]) {
      renderStopLines(marker, lat, lon, name, stopLineCache[key]);
      return;
    }
    var official = marker.officialLines && marker.officialLines.length ? marker.officialLines : null;
    var officialSet = null;
    if (official) {
      officialSet = {};
      official.forEach(function(nr) { officialSet[nr.toUpperCase()] = true; });
    }
    var modes = Object.keys(ROUTE_LAYERS);
    Promise.all(modes.map(function(mode) {
      return arcgisFetch(ROUTE_LAYERS[mode], {
        geometry: lon + ',' + lat, geometryType: 'esriGeometryPoint', inSR: 4326,
        spatialRel: 'esriSpatialRelIntersects', distance: 35, units: 'esriSRUnit_Meter',
        outFields: 'liini_nr', returnGeometry: false, outSR: 4326, f: 'geojson'
      }).then(function(gj) {
        var seen = {}, list = [];
        (gj.features || []).forEach(function(f) {
          var nr = (f.properties.liini_nr || '').trim();
          if (!nr || seen[nr]) return;
          if (officialSet && !officialSet[nr.toUpperCase()]) return;
          seen[nr] = true;
          list.push(nr);
        });
        list.sort(function(a, b) { return a.localeCompare(b, undefined, { numeric: true }); });
        return list;
      }).catch(function() { return []; });
    })).then(function(results) {
      var lines = { bus: results[modes.indexOf('bus')], troll: results[modes.indexOf('troll')], tram: results[modes.indexOf('tram')] };
      stopLineCache[key] = lines;
      renderStopLines(marker, lat, lon, name, lines);
    });
  }

  function renderStopLines(marker, lat, lon, name, lines) {
    var html = '<div class="stop-title">' + escapeHtml(name) + '</div>';
    var total = lines.bus.length + lines.troll.length + lines.tram.length;
    if (!total) {
      html += '<div class="stop-empty">Läbivaid liine ei leitud.</div>';
    } else {
      html += '<div class="stop-lines">';
      ['bus', 'troll', 'tram'].forEach(function(mode) {
        lines[mode].forEach(function(nr) {
          html += '<span class="line-pill" style="background:' + ROUTE_COLORS[mode] + '" data-mode="' + mode + '" data-line="' + escapeHtml(nr) + '">' + escapeHtml(nr) + '</span>';
        });
      });
      html += '</div>';
    }
    marker.setPopupContent(html);
    var el = marker.getPopup().getElement();
    if (!el) return;
    keepPopupClearOfEtaPanel(marker);
    el.querySelectorAll('.line-pill').forEach(function(pill) {
      pill.addEventListener('click', function(e) {
        e.stopPropagation();
        selectStopLine(marker, lat, lon, name, pill.getAttribute('data-mode'), pill.getAttribute('data-line'), lines);
      });
    });
  }

  function selectStopLine(marker, lat, lon, name, mode, lineNr, lines) {
    marker.closePopup();
    activateRoute(mode, lineNr, { lat: lat, lon: lon, name: name });
  }

  function setEtaPanel(data) {
    var el = document.getElementById('etaPanel');
    el.classList.remove('show', 'eta-panel-wide');
    el.innerHTML = '';
    clearLiveScheduleRetry();
    liveScheduleStops = null;
    liveScheduleFullStops = null;
    liveScheduleCtx = null;
  }

  function setEtaPanelSchedule(ctx, times) {
    var el = document.getElementById('etaPanel');
    var chips = times.map(function(t) {
      return '<span class="eta-chip' + (t.delayed ? ' delayed' : '') + '">' + escapeHtml(t.clock) + '</span>';
    }).join('');
    var mins = times[0] ? times[0].minutesUntil : null;
    var minsText = mins === 0 ? 'Saabub kohe.' : (mins != null ? 'Saabub ' + mins + ' minuti pärast.' : '');
    var minsHtml = minsText ? '<div class="eta-mins">' + escapeHtml(minsText) + '</div>' : '';
    el.innerHTML =
      '<div class="eta-line">Liin ' + escapeHtml(ctx.lineNr) + '</div>' +
      '<div class="eta-stop">Peatuses ' + escapeHtml(ctx.stopName) + '</div>' +
      '<div class="eta-times">' + chips + '</div>' +
      minsHtml;
    el.classList.remove('eta-panel-wide');
    el.classList.add('show');
  }

  function setEtaPanelEmpty(ctx) {
    var el = document.getElementById('etaPanel');
    el.innerHTML =
      '<div class="eta-line">Liin ' + escapeHtml(ctx.lineNr) + '</div>' +
      '<div class="eta-stop">Peatuses ' + escapeHtml(ctx.stopName) + '</div>' +
      '<div class="eta-empty">Hetkel andmed puuduvad.</div>';
    el.classList.remove('eta-panel-wide');
    el.classList.add('show');
  }

  // ---------- Sõiduki trajektoori ajakava paneel ----------
  function vehicleHeaderHtml(model, reg) {
    var regHtml = reg
      ? '<div class="eta-reg-row"><span class="veh-reg-link" data-reg="' + escapeHtml(reg) + '">' + escapeHtml(reg) + '</span></div>'
      : '';
    return '<div class="eta-stop">' + escapeHtml(model) + '</div>' + regHtml;
  }
  function wireVehicleHeaderRegLink(el) {
    var link = el.querySelector('.veh-reg-link');
    if (!link) return;
    link.onclick = function(e) {
      e.stopPropagation();
      focusOnVehicleByReg(link.getAttribute('data-reg'));
    };
  }
  function setEtaPanelVehicleLoading(lineNr, model, reg) {
    var el = document.getElementById('etaPanel');
    el.classList.add('show', 'eta-panel-wide');
    el.innerHTML =
      '<div class="eta-line">Liin ' + escapeHtml(lineNr) + '</div>' +
      vehicleHeaderHtml(model, reg) +
      '<div class="stop-loading">Laen sõiduplaani…</div>';
    wireVehicleHeaderRegLink(el);
    clearLiveScheduleRetry();
    liveScheduleStops = null;
    liveScheduleFullStops = null;
    liveScheduleCtx = null;
  }
  function setEtaPanelVehicleEmpty(lineNr, model, reg) {
    var el = document.getElementById('etaPanel');
    el.classList.add('show', 'eta-panel-wide');
    el.innerHTML =
      '<div class="eta-line">Liin ' + escapeHtml(lineNr) + '</div>' +
      vehicleHeaderHtml(model, reg) +
      '<div class="eta-empty">Hetkel andmed puuduvad.</div>';
    wireVehicleHeaderRegLink(el);
    clearLiveScheduleRetry();
    liveScheduleStops = null;
    liveScheduleFullStops = null;
    liveScheduleCtx = null;
  }
  function setEtaPanelVehicleSchedule(lineNr, model, reg, rows) {
    var el = document.getElementById('etaPanel');
    var rowsHtml = rows.map(function(r) {
      var timeHtml = r.clock
        ? '<span class="tt-time">' + escapeHtml(r.clock) + '</span>'
        : '<span class="tt-time tt-missing"></span>';
      var clickable = (r.id != null && r.lat != null && r.lon != null);
      return '<div class="tt-row' + (clickable ? ' clickable' : '') + '"' +
              (clickable ? ' data-stop-id="' + escapeHtml(r.id) + '" data-lat="' + r.lat + '" data-lon="' + r.lon + '"' : '') +
              '><span class="tt-stop">' + escapeHtml(r.name) + '</span>' + timeHtml + '</div>';
    }).join('');
    el.innerHTML =
      '<div class="eta-line">Liin ' + escapeHtml(lineNr) + '</div>' +
      vehicleHeaderHtml(model, reg) +
      '<div class="eta-timetable">' + rowsHtml + '</div>';
    el.classList.add('show', 'eta-panel-wide');
    wireVehicleHeaderRegLink(el);
    el.querySelectorAll('.tt-row.clickable').forEach(function(row) {
      row.addEventListener('click', function() {
        focusOnStopById(row.getAttribute('data-stop-id'), parseFloat(row.getAttribute('data-lat')), parseFloat(row.getAttribute('data-lon')));
      });
    });
    liveScheduleStops = rows
      .filter(function(r) { return r.id != null && typeof r.progress === 'number'; })
      .map(function(r) { return { id: r.id, progress: r.progress }; });
  }

  function removeScheduleStopRowFromDom(stopId) {
    var el = document.getElementById('etaPanel');
    if (!el) return;
    var row = el.querySelector('.tt-row[data-stop-id="' + String(stopId).replace(/"/g, '') + '"]');
    if (row) row.parentNode.removeChild(row);
  }

  function appendScheduleRows(rows) {
    var container = document.querySelector('#etaPanel .eta-timetable');
    if (!container || !liveScheduleStops) return;
    rows.forEach(function(r) {
      var timeHtml = r.clock
        ? '<span class="tt-time">' + escapeHtml(r.clock) + '</span>'
        : '<span class="tt-time tt-missing"></span>';
      var clickable = (r.id != null && r.lat != null && r.lon != null);
      var div = document.createElement('div');
      div.className = 'tt-row' + (clickable ? ' clickable' : '');
      if (clickable) {
        div.setAttribute('data-stop-id', r.id);
        div.setAttribute('data-lat', r.lat);
        div.setAttribute('data-lon', r.lon);
        div.addEventListener('click', function() { focusOnStopById(r.id, r.lat, r.lon); });
      }
      div.innerHTML = '<span class="tt-stop">' + escapeHtml(r.name) + '</span>' + timeHtml;
      container.appendChild(div);
      liveScheduleStops.push({ id: r.id, progress: r.progress });
    });
  }

  function fetchAndFilterStopBatch(mode, lineNr, batch) {
    return Promise.all(batch.map(function(s) {
      return fetchSiriScheduleTimes(mode, lineNr, s.lat, s.lon).then(function(times) {
        return { id: s.id, name: s.name, lat: s.lat, lon: s.lon, progress: s.progress, candidates: times || [] };
      }).catch(function() { return { id: s.id, name: s.name, lat: s.lat, lon: s.lon, progress: s.progress, candidates: [] }; });
    })).then(function(rows) {
      var out = [];
      rows.forEach(function(r) {
        var pick = null;
        for (var i = 0; i < r.candidates.length; i++) {
          var c = r.candidates[i];
          if (c.clock && c.minutesUntil != null && c.minutesUntil >= liveScheduleLastMinutes - 1) { pick = c; break; }
        }
        if (!pick) return;
        out.push({ id: r.id, name: r.name, lat: r.lat, lon: r.lon, progress: r.progress, clock: pick.clock });
        if (pick.minutesUntil > liveScheduleLastMinutes) liveScheduleLastMinutes = pick.minutesUntil;
      });
      return out;
    });
  }

  function topUpLiveSchedule() {
    if (!liveScheduleCtx || liveScheduleCtx.gen !== routeGen) return;
    if (!liveScheduleFullStops || liveScheduleIdx >= liveScheduleFullStops.length) return;
    if (!liveScheduleStops || liveScheduleStops.length >= STOP_CAP) return;
    if (liveScheduleTopUpBusy) return;
    liveScheduleTopUpBusy = true;
    var need = STOP_CAP - liveScheduleStops.length;
    var batch = liveScheduleFullStops.slice(liveScheduleIdx, liveScheduleIdx + need);
    var ctx = liveScheduleCtx;
    fetchAndFilterStopBatch(ctx.mode, ctx.lineNr, batch).then(function(rows) {
      liveScheduleTopUpBusy = false;
      if (ctx.gen !== routeGen || liveScheduleCtx !== ctx) return;
      liveScheduleIdx += batch.length;
      if (rows.length) appendScheduleRows(rows);
    }).catch(function() { liveScheduleTopUpBusy = false; });
  }

  function checkLiveScheduleProgress(reg, lat, lon, headingDeg) {
    if (!liveScheduleStops || !liveScheduleStops.length) return;
    if (reg !== selectedVehicleReg) return;
    if (!currentRouteGeom || !currentRouteGeom.length) return;
    var proj = projectPointToRoute(lat, lon, currentRouteGeom, headingDeg);
    var PASSED_MARGIN_METERS = 30;
    var removed = false;
    while (liveScheduleStops.length && liveScheduleStops[0].progress < proj.progress - PASSED_MARGIN_METERS) {
      var passed = liveScheduleStops.shift();
      removeScheduleStopRowFromDom(passed.id);
      removed = true;
    }
    if (!removed) return;
    if (liveScheduleStops.length) { topUpLiveSchedule(); return; }
    if (liveScheduleFullStops && liveScheduleIdx < liveScheduleFullStops.length) { topUpLiveSchedule(); return; }
    startTerminusReachedRetry();
  }

  function projectOnSegment(lat, lon, a, b) {
    var mPerDegLat = 111320;
    var mPerDegLon = 111320 * Math.cos(a[0] * Math.PI / 180);
    var bx = (b[1] - a[1]) * mPerDegLon, by = (b[0] - a[0]) * mPerDegLat;
    var px = (lon - a[1]) * mPerDegLon, py = (lat - a[0]) * mPerDegLat;
    var lenSq = bx * bx + by * by;
    var t = lenSq > 0 ? (px * bx + py * by) / lenSq : 0;
    t = Math.max(0, Math.min(1, t));
    var projx = t * bx, projy = t * by;
    var ddx = px - projx, ddy = py - projy;
    return { t: t, distMeters: Math.sqrt(ddx * ddx + ddy * ddy) };
  }

  function segmentBearingDeg(a, b) {
    var mPerDegLat = 111320;
    var mPerDegLon = 111320 * Math.cos(a[0] * Math.PI / 180);
    var dx = (b[1] - a[1]) * mPerDegLon, dy = (b[0] - a[0]) * mPerDegLat;
    var deg = Math.atan2(dx, dy) * 180 / Math.PI;
    return (deg + 360) % 360;
  }

  function angleDiffDeg(a, b) {
    var d = Math.abs(a - b) % 360;
    return d > 180 ? 360 - d : d;
  }

  var HEADING_MAX_DIFF_DEG = 90;

  function projectPointToRoute(lat, lon, routeGeom, headingDeg) {
    var hasHeading = (typeof headingDeg === 'number' && !isNaN(headingDeg));
    var best = { dist: Infinity, progress: 0 };
    var bestAny = { dist: Infinity, progress: 0 };
    var cumulative = 0;
    routeGeom.forEach(function(line) {
      for (var i = 0; i < line.length - 1; i++) {
        var a = line[i], b = line[i + 1];
        var segLenMeters = haversineMeters(a[0], a[1], b[0], b[1]);
        var proj = projectOnSegment(lat, lon, a, b);
        if (proj.distMeters < bestAny.dist) {
          bestAny.dist = proj.distMeters;
          bestAny.progress = cumulative + proj.t * segLenMeters;
        }
        var directionOk = true;
        if (hasHeading && segLenMeters > 3) {
          directionOk = angleDiffDeg(headingDeg, segmentBearingDeg(a, b)) <= HEADING_MAX_DIFF_DEG;
        }
        if (directionOk && proj.distMeters < best.dist) {
          best.dist = proj.distMeters;
          best.progress = cumulative + proj.t * segLenMeters;
        }
        cumulative += segLenMeters;
      }
    });
    return (hasHeading && best.dist < Infinity) ? best : bestAny;
  }

  function buildVehicleRouteStops(mode, lineNr, reg) {
    var v = vehicles[reg];
    var geom = currentRouteGeom;
    if (!v || !geom || !geom.length) return Promise.resolve([]);
    var vehHeading = v.hasHeadingIcon ? v.headingDeg : null;
    var vehProj = projectPointToRoute(v.lat, v.lon, geom, vehHeading);
    var vehProgress = vehProj.progress;
    var VEHICLE_OFF_ROUTE_METERS = 150;
    if (vehProj.dist > VEHICLE_OFF_ROUTE_METERS) return Promise.resolve([]);
    var destName = (v.data && v.data.destination ? v.data.destination : '').trim().toLowerCase();

    var minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
    geom.forEach(function(line) {
      line.forEach(function(p) {
        if (p[0] < minLat) minLat = p[0];
        if (p[0] > maxLat) maxLat = p[0];
        if (p[1] < minLon) minLon = p[1];
        if (p[1] > maxLon) maxLon = p[1];
      });
    });
    if (!isFinite(minLat)) return Promise.resolve([]);
    var pad = 0.004;
    var bbox = [minLon - pad, minLat - pad, maxLon + pad, maxLat + pad].join(',');
    var wantNr = String(lineNr).trim().toUpperCase();

    return arcgisFetch(STOPS_LAYER, {
      geometry: bbox, geometryType: 'esriGeometryEnvelope', inSR: 4326,
      spatialRel: 'esriSpatialRelIntersects',
      outFields: 'objectid,nimetus,liini_nr', returnGeometry: true, outSR: 4326, f: 'geojson'
    }).then(function(gj) {
      var stops = [];
      (gj.features || []).forEach(function(f) {
        if (!f.geometry) return;
        var official = (f.properties.liini_nr || '').split(',').map(function(s) { return s.trim().toUpperCase(); });
        if (official.indexOf(wantNr) === -1) return;
        var lon = f.geometry.coordinates[0], lat = f.geometry.coordinates[1];
        var proj = projectPointToRoute(lat, lon, geom);
        if (proj.dist > 60) return;
        stops.push({ id: f.properties.objectid, name: f.properties.nimetus || 'Peatus', lat: lat, lon: lon, progress: proj.progress });
      });
      stops.sort(function(a, b) { return a.progress - b.progress; });
      var remaining = stops.filter(function(s) { return s.progress >= vehProgress - 30; });

      var CURRENT_STOP_AT_VEHICLE_METERS = 40;
      while (remaining.length && haversineMeters(v.lat, v.lon, remaining[0].lat, remaining[0].lon) <= CURRENT_STOP_AT_VEHICLE_METERS) {
        remaining = remaining.slice(1);
      }

      var cutIdx = -1;
      if (destName) {
        for (var i = 0; i < remaining.length; i++) {
          if ((remaining[i].name || '').trim().toLowerCase() === destName) { cutIdx = i; break; }
        }
        if (cutIdx === -1) {
          for (var j = 0; j < remaining.length; j++) {
            var nm = (remaining[j].name || '').trim().toLowerCase();
            if (nm && (nm.indexOf(destName) !== -1 || destName.indexOf(nm) !== -1)) { cutIdx = j; break; }
          }
        }
      }
      if (cutIdx !== -1) {
        remaining = remaining.slice(0, cutIdx + 1);
      } else {
        var seenStopNames = {};
        for (var k = 0; k < remaining.length; k++) {
          var stopNm = (remaining[k].name || '').trim().toLowerCase();
          if (stopNm && seenStopNames[stopNm]) { remaining = remaining.slice(0, k); break; }
          if (stopNm) seenStopNames[stopNm] = true;
        }
      }

      return remaining;
    }).catch(function() { return []; });
  }

  function clearLiveScheduleRetry() {
    if (liveScheduleRetryTimer) { clearTimeout(liveScheduleRetryTimer); liveScheduleRetryTimer = null; }
  }

  function tryLoadVehicleSchedule(mode, lineNr, reg, myGen) {
    return buildVehicleRouteStops(mode, lineNr, reg).then(function(stops) {
      if (routeGen !== myGen) return false;
      if (!stops.length) return false;
      liveScheduleLastMinutes = -Infinity;
      var capped = stops.slice(0, STOP_CAP);
      return fetchAndFilterStopBatch(mode, lineNr, capped).then(function(filtered) {
        if (routeGen !== myGen) return false;
        if (!filtered.length) return false;
        var v = vehicles[reg];
        var model = (v && v.data.model) || 'Teadmata';
        setEtaPanelVehicleSchedule(lineNr, model, reg, filtered);
        liveScheduleFullStops = stops;
        liveScheduleIdx = capped.length;
        liveScheduleCtx = { mode: mode, lineNr: lineNr, gen: myGen };
        return true;
      });
    }).catch(function() { return false; });
  }

  function scheduleEmptyRetry(mode, lineNr, reg, myGen) {
    clearLiveScheduleRetry();
    liveScheduleRetryTimer = setTimeout(function() {
      liveScheduleRetryTimer = null;
      if (routeGen !== myGen || reg !== selectedVehicleReg) return;
      tryLoadVehicleSchedule(mode, lineNr, reg, myGen).then(function(ok) {
        if (routeGen !== myGen || reg !== selectedVehicleReg) return;
        if (!ok) scheduleEmptyRetry(mode, lineNr, reg, myGen);
      });
    }, EMPTY_RETRY_INTERVAL_MS);
  }

  function retryTerminusStep(mode, lineNr, reg, myGen, elapsedMs) {
    liveScheduleRetryTimer = setTimeout(function() {
      liveScheduleRetryTimer = null;
      if (routeGen !== myGen || reg !== selectedVehicleReg) return;
      tryLoadVehicleSchedule(mode, lineNr, reg, myGen).then(function(ok) {
        if (routeGen !== myGen || reg !== selectedVehicleReg) return;
        if (ok) return;
        var nextElapsed = elapsedMs + TERMINUS_RETRY_INTERVAL_MS;
        if (nextElapsed >= TERMINUS_RETRY_MAX_MS) {
          var v = vehicles[reg];
          var model = (v && v.data.model) || 'Teadmata';
          setEtaPanelVehicleEmpty(lineNr, model, reg);
          scheduleEmptyRetry(mode, lineNr, reg, myGen);
        } else {
          retryTerminusStep(mode, lineNr, reg, myGen, nextElapsed);
        }
      });
    }, TERMINUS_RETRY_INTERVAL_MS);
  }

  function startTerminusReachedRetry() {
    var ctx = liveScheduleCtx;
    if (!ctx) return;
    var mode = ctx.mode, lineNr = ctx.lineNr, myGen = ctx.gen, reg = selectedVehicleReg;
    var v = vehicles[reg];
    var model = (v && v.data.model) || 'Teadmata';
    setEtaPanelVehicleLoading(lineNr, model, reg);
    retryTerminusStep(mode, lineNr, reg, myGen, 0);
  }

  function loadVehicleTimetablePanel(mode, lineNr, reg, myGen) {
    var v = vehicles[reg];
    var model = (v && v.data.model) || 'Teadmata';
    setEtaPanelVehicleLoading(lineNr, model, reg);
    tryLoadVehicleSchedule(mode, lineNr, reg, myGen).then(function(ok) {
      if (routeGen !== myGen) return;
      if (!ok) {
        setEtaPanelVehicleEmpty(lineNr, model, reg);
        scheduleEmptyRetry(mode, lineNr, reg, myGen);
      }
    });
  }

  // ---------- Sõiduplaani (SIRI) põhine ETA - täpsed kellaajad GPS-hinnangu asemel ----------
  var siriStopsIndex = null;
  var siriStopsPromise = null;
  var siriScheduleCache = {};

  function normalizeCoord(raw, min, max) {
    var candidates = [raw, raw / 10000, raw / 100000, raw / 1000000];
    for (var i = 0; i < candidates.length; i++) {
      if (candidates[i] >= min && candidates[i] <= max) return candidates[i];
    }
    return null;
  }

  function parseStopsTxt(text) {
    var lines = text.split('\n');
    if (!lines.length) return [];
    var header = lines[0].replace(/\r$/, '').split(';').map(function(h) { return h.trim().toLowerCase(); });
    var idxSiri = header.indexOf('siriid');
    var idxLat = header.indexOf('lat');
    var idxLng = header.indexOf('lng');
    var idxName = header.indexOf('name');
    if (idxSiri === -1) idxSiri = 1;
    if (idxLat === -1) idxLat = 2;
    if (idxLng === -1) idxLng = 3;

    var out = [];
    for (var i = 1; i < lines.length; i++) {
      var raw = lines[i].replace(/\r$/, '');
      if (!raw) continue;
      var fields = raw.split(';');
      var siriId = parseInt(fields[idxSiri], 10);
      var lat = normalizeCoord(parseFloat(fields[idxLat]), 55, 60);
      var lon = normalizeCoord(parseFloat(fields[idxLng]), 20, 29);
      if (!isFinite(siriId) || lat === null || lon === null) continue;
      out.push({ siriId: siriId, lat: lat, lon: lon, name: idxName !== -1 ? fields[idxName] : '' });
    }
    return out;
  }

  function loadSiriStops() {
    if (siriStopsPromise) return siriStopsPromise;
    siriStopsPromise = fetchTextFromSources(buildProxyList(STOPS_TXT_URL), 14000)
      .then(function(text) {
        var parsed = parseStopsTxt(text);
        if (!parsed.length) throw new Error('Peatuste nimekiri oli tühi');
        siriStopsIndex = parsed;
        return parsed;
      })
      .catch(function(e) {
        siriStopsPromise = null;
        throw e;
      });
    return siriStopsPromise;
  }

  function findSiriStopId(lat, lon) {
    if (!siriStopsIndex || !siriStopsIndex.length) return null;
    var best = null, bestDist = Infinity;
    for (var i = 0; i < siriStopsIndex.length; i++) {
      var s = siriStopsIndex[i];
      var d = haversineMeters(lat, lon, s.lat, s.lon);
      if (d < bestDist) { bestDist = d; best = s; }
    }
    return (best && bestDist <= SIRI_STOP_MATCH_METERS) ? best.siriId : null;
  }

  var SIRI_TYPE_RE = { bus: /bus/i, troll: /trol/i, tram: /tram/i };
  function parseSiriDepartures(text) {
    var out = [];
    text.split('\n').forEach(function(raw) {
      raw = raw.replace(/\r$/, '').trim();
      if (!raw) return;
      if (/^transport\s*,/i.test(raw)) return;
      var parts = raw.split(',');
      if (parts.length < 4) return;
      var expectedSec = parseInt(parts[2], 10);
      var aimedSec = parseInt(parts[3], 10);
      if (!isFinite(expectedSec)) return;
      out.push({
        type: (parts[0] || '').trim(),
        line: (parts[1] || '').trim(),
        expectedSec: expectedSec,
        aimedSec: isFinite(aimedSec) ? aimedSec : expectedSec,
        dest: parts.slice(4).join(',').trim()
      });
    });
    return out;
  }

  function secondsToClock(sec) {
    sec = ((Math.round(sec) % 86400) + 86400) % 86400;
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function fetchSiriScheduleTimes(mode, lineNr, lat, lon) {
    return loadSiriStops().then(function() {
      var siriId = findSiriStopId(lat, lon);
      if (!siriId) throw new Error('Peatust ei leitud sõiduplaani andmestikust');
      var key = siriId + '|' + mode + '|' + lineNr;
      var cached = siriScheduleCache[key];
      var now = Date.now();
      if (cached && (now - cached.time) < SIRI_SCHEDULE_TTL_MS) return cached.promise;
      var url = SIRI_DEPARTURES_URL + '?stopid=' + encodeURIComponent(siriId) + '&_=' + now;
      var p = fetchTextFromSources(buildProxyList(url), 12000).then(function(text) {
        var all = parseSiriDepartures(text);
        var typeRe = SIRI_TYPE_RE[mode];
        var wantLine = String(lineNr).trim().toUpperCase();
        var matches = all.filter(function(d) {
          var lineOk = d.line.toUpperCase() === wantLine;
          var typeOk = !d.type || !typeRe || typeRe.test(d.type);
          return lineOk && typeOk;
        });
        if (!matches.length) throw new Error('Liini ' + lineNr + ' väljumisaegu ei leitud');
        matches.sort(function(a, b) { return a.expectedSec - b.expectedSec; });
        var nowSec = (function() { var d = new Date(); return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds(); })();
        return matches.slice(0, 3).map(function(m) {
          return {
            clock: secondsToClock(m.expectedSec),
            dest: m.dest,
            delayed: (m.expectedSec - m.aimedSec) > 90,
            minutesUntil: Math.round((((m.expectedSec - nowSec) % 86400) + 86400) % 86400 / 60)
          };
        });
      });
      siriScheduleCache[key] = { time: now, promise: p };
      p.catch(function() { delete siriScheduleCache[key]; });
      return p;
    });
  }

  // ---------- Liini-trajektoori aktiveerimine/deaktiveerimine ----------
  var activeEtaContext = null;

  function refreshActiveEtaPanel() {
    if (!activeEtaContext) return;
    var ctx = activeEtaContext;
    fetchSiriScheduleTimes(ctx.mode, ctx.lineNr, ctx.lat, ctx.lon).then(function(times) {
      if (activeEtaContext !== ctx) return;
      setEtaPanelSchedule(ctx, times);
    }).catch(function(e) {
      if (activeEtaContext !== ctx) return;
      setEtaPanelEmpty(ctx);
    });
  }

  function activateRoute(mode, lineNr, stopInfo, vehicleInfo) {
    var myGen = ++routeGen;
    applyLineLock(mode, lineNr);
    trajectoryActive = true;
    trajectoryLineNr = String(lineNr);
    setShowAllBtnState(true);
    return drawRoute(mode, lineNr).then(function() {
      if (myGen !== routeGen) return;
      applyStopTrajectoryFilter();
      if (stopInfo) {
        setSelectedVehicleReg(null);
        setSelectedStopMarker(stopInfo.lat, stopInfo.lon);
        activeEtaContext = { mode: mode, lineNr: lineNr, lat: stopInfo.lat, lon: stopInfo.lon, stopName: stopInfo.name };

      } else if (vehicleInfo) {
        clearSelectedStopMarker();

  // ---------- Ajakava paneelist kaardil vaatamine (peatuse rida / sõiduki registrinumber) ----------
  function focusMapOnAndThen(lat, lon, cb) {
    map.once('moveend', function() { setTimeout(cb, 60); });
    map.flyTo([lat, lon], Math.max(map.getZoom(), 17), { duration: 0.6 });
  }

  function keepPopupClearOfEtaPanel(marker) {
    var popup = marker.getPopup && marker.getPopup();
    var popupEl = popup && popup.isOpen && popup.isOpen() && popup.getElement();

    if (!popupEl || !etaEl || !etaEl.classList.contains('show')) return;
    var popRect = popupEl.getBoundingClientRect();
    var etaRect = etaEl.getBoundingClientRect();
    if (popRect.left >= etaRect.right || popRect.right <= etaRect.left) return;
    var overlap = (etaRect.bottom + 12) - popRect.top;
    if (overlap > 0) {
      map.panBy([0, -overlap], { animate: true, duration: 0.3 });
    }

  function focusOnStopById(stopId, lat, lon) {
    if (stopId == null || !isFinite(lat) || !isFinite(lon)) return;

      var attempts = 0;
      (function tryOpen() {
        var marker = stopMarkersById[stopId];
        if (marker) { marker.openPopup(); return; }
        attempts++;
        if (attempts > 40) return;
        setTimeout(tryOpen, 120);
      })();
    });
  }

  function focusOnVehicleByReg(reg) {
    if (!reg || !vehicles[reg]) return;

    focusMapOnAndThen(v.lat, v.lon, function() {
      var attempts = 0;

        var vv = vehicles[reg];

  var routeSvgRenderer = L.svg({ pane: 'routePane' });
  var currentRouteGeom = null;

  function extractLineStrings(geometry) {
    if (!geometry) return [];
    if (geometry.type === 'LineString') {
      return [geometry.coordinates.map(function(c) { return [c[1], c[0]]; })];
    }
    if (geometry.type === 'MultiLineString') {
      return geometry.coordinates.map(function(line) {
        return line.map(function(c) { return [c[1], c[0]]; });
      });
    }
    return [];
  }

  function isNightLine(mode, lineNr) {

    for (var id in vehicles) {
      var d = vehicles[id].data;
      if (d.type === '7' && String(d.line).trim().toUpperCase() === want) return true;
    }

  function drawRoute(mode, lineNr) {
    routeLayer.clearLayers();
    currentRouteGeom = null;
    var routeColor = isNightLine(mode, lineNr) ? ROUTE_COLORS.night : ROUTE_COLORS[mode];
    var whereVal = String(lineNr).replace(/'/g, "''");
    return arcgisFetch(ROUTE_LAYERS[mode], {
      where: "liini_nr='" + whereVal + "'",

  map.on('zoomend moveend', scheduleStopsRefresh);

  function shapeSVG(color, hasHeading) {

           '<path d="M11 2 C11 2 4.5 11.5 4.5 14.8 C4.5 18.5 7.4 20.5 11 20.5 C14.6 20.5 17.5 18.5 17.5 14.8 C17.5 11.5 11 2 11 2 Z" ' +
           'fill="' + color + '" fill-opacity="0.94" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-linejoin="round"/>' +
           '<path d="M11 2 C11 2 4.5 11.5 4.5 14.8 C4.5 18.5 7.4 20.5 11 20.5 C14.6 20.5 17.5 18.5 17.5 14.8 C17.5 11.5 11 2 11 2 Z" ' +

  function makeIcon(color, heading) {

      '<div class="popup-row"><span>Mudel</span><b>' + escapeHtml(model) + '</b></div>' +

  function wireVehiclePopupLineLink(marker) {
    var popup = marker.getPopup();

    if (!el) return;

    if (!link) return;
    link.onclick = function(e) {

  function passesFilter(d) {
    if (filters.modeLock) {
      if (TYPE_TO_MODE[d.type] !== filters.modeLock) return false;
      if (filters.line && d.line.toLowerCase() !== filters.line) return false;
      return true;
    }
    if (!filters.types[d.type]) return false;
    if (filters.reg && d.reg.toLowerCase() !== filters.reg) return false;
    if (filters.line && d.line.toLowerCase() !== filters.line) return false;
    if (filters.models.size > 0 && !filters.models.has(d.model)) return false;
    return true;
  }

  function applyLineLock(mode, lineNr) {
    if (!lineLockSaved) {
      lineLockSaved = { line: filters.line, lineInputVal: lineInput.value };
    }
    filters.line = String(lineNr).trim().toLowerCase();
    filters.modeLock = mode;
    lineInput.value = lineNr;
    reapplyAllFilters();
  }
  function clearLineLock() {
    if (!lineLockSaved) return;
    filters.line = lineLockSaved.line;
    lineInput.value = lineLockSaved.lineInputVal;
    filters.modeLock = null;
    lineLockSaved = null;
    reapplyAllFilters();
  }

  var viewportPadded = null;
  function refreshViewportCache() {
    viewportPadded = map.getBounds().pad(0.25);
  }

  function shouldRender(d) {
    if (!passesFilter(d)) return false;
    if (filters.reg) return true;
    if (map.getZoom() < ZOOM_DETAIL_THRESHOLD) return true;
    if (!viewportPadded) refreshViewportCache();
    return viewportPadded.contains([d.lat, d.lon]);
  }

  // ---------- Shared animation loop ----------
  var activeEntries = new Set();
  var tickHandle = null;

  function scheduleTick() {
    if (tickHandle === null) tickHandle = requestAnimationFrame(runAnimTick);
  }

  function runAnimTick(ts) {
    tickHandle = null;
    activeEntries.forEach(function(entry) {
      var st = entry.animState;
      if (!st) { activeEntries.delete(entry); return; }
      if (!st.start) st.start = ts;
      var t = Math.min(1, (ts - st.start) / ANIM_MS);
      var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      var lat = st.fromLat + (st.toLat - st.fromLat) * ease;
      var lon = st.fromLon + (st.toLon - st.fromLon) * ease;
      entry.marker.setLatLng([lat, lon]);
      if (st.fromHeading !== null && st.toHeading !== null && st.shapeEl) {
        var heading = st.fromHeading + (st.toHeading - st.fromHeading) * ease;
        st.shapeEl.style.transform = 'rotate(' + heading + 'deg)';
      }
      if (t >= 1) {
        entry.animState = null;
        activeEntries.delete(entry);
      }
    });
    if (activeEntries.size > 0) scheduleTick();
  }

  function snapAllAnimationsToFinal() {
    activeEntries.forEach(function(entry) {
      var st = entry.animState;
      if (st) {
        entry.marker.setLatLng([st.toLat, st.toLon]);
        if (st.shapeEl && st.toHeading !== null) {
          st.shapeEl.style.transform = 'rotate(' + st.toHeading + 'deg)';
        }
      }
      entry.animState = null;
    });
    activeEntries.clear();
    if (tickHandle !== null) { cancelAnimationFrame(tickHandle); tickHandle = null; }
  }

  function animateMarker(entry, fromLat, fromLon, toLat, toLon, fromHeading, toHeadingTarget) {
    var el = entry.marker.getElement();
    var shapeEl = el ? el.querySelector('.veh-shape') : null;
    entry.animState = {
      fromLat: fromLat, fromLon: fromLon, toLat: toLat, toLon: toLon,
      fromHeading: fromHeading, toHeading: toHeadingTarget,
      start: null, shapeEl: shapeEl
    };
    activeEntries.add(entry);
    scheduleTick();
  }

  function upsertVehicle(d) {
    var id = d.reg;
    var visible = shouldRender(d);
    var existing = vehicles[id];

    if (!existing) {
      var iconColor = vehicleIconColor(d);
      var icon = makeIcon(iconColor, d.headingNum);
      var marker = L.marker([d.lat, d.lon], { icon: icon, riseOnHover: true });
      marker.bindPopup(popupHTML(d), { closeButton: false, minWidth: 220, maxWidth: 360, autoPanPadding: [20, 20] });
      marker.on('popupopen', function() {
        marker.setPopupContent(popupHTML(vehicles[id] ? vehicles[id].data : d));
        wireVehiclePopupLineLink(marker);
        keepPopupClearOfEtaPanel(marker);
      });
      if (visible) marker.addTo(map);
      vehicles[id] = {
        marker: marker,
        data: d,
        lat: d.lat, lon: d.lon,
        headingDeg: (d.headingNum !== null && d.headingNum !== 999) ? d.headingNum : 0,
        hasHeadingIcon: (d.headingNum !== null && d.headingNum !== 999 && !isNaN(d.headingNum)),
        animState: null
      };
      if (d.reg === selectedVehicleReg) checkLiveScheduleProgress(d.reg, d.lat, d.lon, vehicles[id].hasHeadingIcon ? vehicles[id].headingDeg : null);
      return;
    }

    existing.data = d;
    if (existing.marker.isPopupOpen()) {
      existing.marker.setPopupContent(popupHTML(d));
      wireVehiclePopupLineLink(existing.marker);
    }

    var wasVisible = map.hasLayer(existing.marker);
    var justAppeared = visible && !wasVisible;

    var hasHeading = (d.headingNum !== null && d.headingNum !== 999 && !isNaN(d.headingNum));
    var iconKindChanged = (hasHeading !== existing.hasHeadingIcon);
    var targetHeading;

    if (iconKindChanged || justAppeared) {
      targetHeading = hasHeading ? d.headingNum : existing.headingDeg;
      var iconColor = vehicleIconColor(d);
      existing.marker.setIcon(makeIcon(iconColor, hasHeading ? targetHeading : null));
      existing.hasHeadingIcon = hasHeading;
    } else {
      targetHeading = hasHeading ? angleLerpTarget(existing.headingDeg, d.headingNum) : existing.headingDeg;
    }

    if (visible && !wasVisible) existing.marker.addTo(map);
    if (!visible && wasVisible) map.removeLayer(existing.marker);

    var animate = visible && (map.getZoom() >= ZOOM_DETAIL_THRESHOLD) && !iconKindChanged && !justAppeared;

    if (animate) {
      animateMarker(existing, existing.lat, existing.lon, d.lat, d.lon, existing.headingDeg, targetHeading);
    } else {

      existing.marker.setLatLng([d.lat, d.lon]);
      var el = existing.marker.getElement();
      var shapeEl = el ? el.querySelector('.veh-shape') : null;
      if (shapeEl && targetHeading !== null) shapeEl.style.transform = 'rotate(' + targetHeading + 'deg)';
    }

    existing.lat = d.lat;
    existing.lon = d.lon;
    existing.headingDeg = ((targetHeading % 360) + 360) % 360;

    if (d.reg === selectedVehicleReg) checkLiveScheduleProgress(d.reg, d.lat, d.lon, existing.hasHeadingIcon ? existing.headingDeg : null);
  }

  function pruneMissing(seenIds) {
    for (var id in vehicles) {
      if (!seenIds[id]) {
        var v = vehicles[id];
        if (v.animState) { activeEntries.delete(v); v.animState = null; }
        map.removeLayer(v.marker);
        delete vehicles[id];
      }
    }
  }

  function reapplyAllFilters() {
    refreshViewportCache();
    for (var id in vehicles) {
      var v = vehicles[id];
      var visible = shouldRender(v.data);
      var isOn = map.hasLayer(v.marker);
      if (visible && !isOn) v.marker.addTo(map);
      if (!visible && isOn) map.removeLayer(v.marker);
    }
  }

  // ---------- Parsing ----------
  function parseGPS(text) {
    var lines = text.split('\n');
    var seen = {};
    var counts = { '1': 0, '2': 0, '3': 0, '7': 0 };
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var parts = line.split(',');
      if (parts.length < 9) continue;

      var type = parts[0].trim();
      if (!COLORS[type]) continue;

      var lineNum = parts[1].trim();
      var lonRaw = parseFloat(parts[2]);
      var latRaw = parseFloat(parts[3]);
      if (isNaN(lonRaw) || isNaN(latRaw) || lonRaw === 0 || latRaw === 0) continue;
      var lon = lonRaw / 1000000;
      var lat = latRaw / 1000000;
      var speed = parts[4].trim();
      var headingNum = parseInt(parts[5], 10);
      var reg = parts[6].trim();
      var destination = parts.length > 9 ? parts.slice(9).join(',').trim() : '';

      if (!reg) continue;

      var d = {
        type: type, line: lineNum, lat: lat, lon: lon,
        speed: speed, headingNum: isNaN(headingNum) ? null : headingNum,
        reg: reg, destination: destination,
        model: VEHICLE_MODELS[reg] || 'Teadmata'
      };

      seen[reg] = true;
      counts[type]++;
      upsertVehicle(d);
    }
    pruneMissing(seen);
    return counts;
  }

  // ---------- Fetching ----------
  var statusDot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  var errorBanner = document.getElementById('errorBanner');

  function setStatus(kind, msg) {
    statusDot.className = kind;
    statusText.textContent = msg;
