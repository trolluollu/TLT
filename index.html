<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tallinna ühistranspordi kaart</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg: #0a0c10;
    --panel: #12151b;
    --panel-border: #232833;
    --text: #e7eaee;
    --text-dim: #8b93a1;
    --troll: #0060d3;
    --bus: #00e2b6;
    --night: #7a5cff;
    --tram: #ff5f26;
    --accent: #e7eaee;
    --glass-tint: rgba(255,255,255,0.06);
    --glass-tint-strong: rgba(255,255,255,0.13);
    --glass-border: rgba(255,255,255,0.32);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 1px rgba(255,255,255,0.22);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #map { position:absolute; inset:0; z-index:0; background: var(--bg); }

  #map.dark-mode .leaflet-tile-pane { filter: brightness(0.85) contrast(1.05); }

  /* Top control panel */
  #panel {
    position:absolute; top:14px; left:14px; right:14px;
    z-index: 1000;
    background: var(--glass-tint);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 12px 16px;
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    gap: 14px;
    font-size: 13px;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
  }
  .brand {
    display:flex;
    align-items:center;
    padding-right: 12px;
    border-right: 1px solid var(--glass-border);
    flex: none;
  }
  .brand #logoImg {
    width: 32px;
    height: 32px;
    object-fit: contain;
    display:block;
  }
  .brand .brand-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    white-space: nowrap;
    color: var(--text);
  }
  .field { display:flex; flex-direction:column; gap:3px; }
  .field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
  .field input[type="text"] {
    background: rgba(0,0,0,0.22);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    width: 130px;
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input[type="text"]:focus { border-color: rgba(0,226,182,0.6); background: rgba(0,0,0,0.32); }
  .field input[type="text"]::placeholder { color: #9aa3b0; opacity: 0.7; }

  .types { display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
  .chip {
    display:flex; align-items:center; gap:6px;
    background: var(--glass-tint); border:1px solid var(--glass-border);
    border-radius: 999px; padding: 6px 12px 6px 8px; cursor:pointer;
    user-select:none; font-size:12px; white-space:nowrap;
    transition: border-color .15s ease, opacity .15s ease, background .15s ease;
    isolation: isolate;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
  }
  .chip input { display:none; }
  .chip .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .chip.off { opacity: 0.35; }
  .chip:hover { background: var(--glass-tint-strong); }

  #showAllBtn {
    background: linear-gradient(135deg, var(--bus), var(--troll));
    color: #04121c;
    border: none;
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 6px 18px rgba(0,226,182,0.25);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  #showAllBtn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(0,226,182,0.35); }
  #showAllBtn:active { transform: translateY(0); }

  #mapModeBtn {
    position: absolute;
    right: 14px;
    bottom: 14px;
    z-index: 1000;
    background: var(--glass-tint);
    color: var(--text);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
    transition: transform .2s ease, background .2s ease;
  }
  #mapModeBtn:hover { background: var(--glass-tint-strong); transform: translateY(-1px); }

  .spacer { flex: 1 1 auto; }

  #status {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    display:flex; align-items:center; gap:8px;
  }
  #statusDot { width:8px; height:8px; border-radius:50%; background:#555; flex:none; transition: background .2s ease; }
  #statusDot.ok { background:#ff4d4d; box-shadow: 0 0 6px #ff4d4d; animation: liveBlink 1.4s ease-in-out infinite; }
  @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  #statusDot.bad { background:#ff4d4d; box-shadow: 0 0 6px #ff4d4d; }
  #statusDot.pending { background:#e8b93f; }

  #errorBanner {
    position:absolute; top: 76px; left:14px; z-index:1000;
    background: rgba(120, 30, 30, 0.22);
    border:1px solid rgba(255,120,120,0.4);
    color:#ffd5d5;
    padding:10px 14px;
    border-radius: 16px;
    font-size: 12px;
    max-width: 420px;
    display:none;
    isolation: isolate;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 1px rgba(255,180,180,0.2);
  }

  /* Vehicle marker */
  .veh-icon { transition: none; }
  .veh-shape {
    width: 22px; height: 22px;
    display:flex; align-items:center; justify-content:center;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }
  .veh-shape svg { display:block; }
  .veh-label {
    position:absolute;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 700;
    color: #0a0c10;
    background: rgba(231,234,238,0.92);
    padding: 0px 4px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: rgba(18,21,27,0.55);
    color: var(--text);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    isolation: isolate;
    box-shadow: var(--glass-shadow);
  }
  .leaflet-popup-tip { background: rgba(18,21,27,0.75); }
  .leaflet-popup-content { margin: 12px 14px; font-size: 13px; }
  .veh-photo-wrap {
    position: relative;
    width: 100%;
    height: 150px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  .veh-photo-glow {
    position: absolute;
    inset: 34px;
    z-index: 0;
    filter: blur(9px);
    pointer-events: none;
  }
  .veh-photo {
    position: relative;
    z-index: 1;
    display: block;
    max-width: 97%;
    max-height: 97%;
    object-fit: contain;
    -webkit-mask-image: radial-gradient(ellipse 85% 85% at center, #000 92%, transparent 100%);
    mask-image: radial-gradient(ellipse 85% 85% at center, #000 92%, transparent 100%);
  }
  .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; display:flex; align-items:center; gap:7px; }
  .popup-title .dot { width:10px; height:10px; border-radius:50%; }
  .popup-row { display:flex; justify-content:space-between; gap: 16px; padding: 2px 0; color: var(--text-dim); font-size: 12px; }
  .popup-row b { color: var(--text); font-weight:600; }

  #secondaryControls { display: contents; }

  @media (max-width: 720px) {
    #panel { top: 8px; left: 8px; right: 8px; padding: 10px; gap: 10px; }
    .field input[type="text"] { width: 100px; }
    #status { width: 100%; order: 10; }

    #secondaryControls {
      display: flex;
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 1000;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    #secondaryControls #modelFilterBtn {
      background: var(--glass-tint-strong);
    }
    #secondaryControls #modelDropdown {
      top: auto;
      bottom: calc(100% + 6px);
    }
  }

  #modelFilterBtn {
    background: var(--glass-tint);
    color: var(--text-dim);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    isolation: isolate;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  #modelFilterBtn:hover { color: var(--text); background: var(--glass-tint-strong); }
  #modelFilterBtn.active-filter { border-color: var(--bus); color: var(--bus); }

  #modelDropdown {
    display:none;
    position:absolute;
    top: calc(100% + 6px);
    left:0;
    z-index: 1100;
    background: var(--glass-tint-strong);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    width: 260px;
    max-height: 340px;
    overflow: hidden;
    isolation: isolate;
    box-shadow: var(--glass-shadow);
  }
  #modelDropdownList {
    max-height: 340px;
    overflow-y: auto;
    padding: 10px;
    position: relative;
    z-index: 1;
  }
  #modelDropdown.open { display:block; }
  #modelDropdown .group-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 8px 0 4px;
  }
  #modelDropdown .group-title:first-child { margin-top: 0; }
  #modelDropdown label {
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 12.5px;
    padding: 4px 2px;
    cursor: pointer;
    border-radius: 6px;
  }
  #modelDropdown label:hover { background: rgba(255,255,255,0.1); }
  #modelDropdown input { accent-color: var(--bus); }
  #modelDropdown .clear-models {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--glass-border);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    text-align: right;
  }
  #modelDropdown .clear-models:hover { color: var(--text); }

  /* ================= Liquid glass ================= */
  .chip,
  #modelFilterBtn {
    position: relative;
  }
  #panel::before,
  #mapModeBtn::before,
  #errorBanner::before,
  .chip::before,
  #modelFilterBtn::before,
  #modelDropdown::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    backdrop-filter: blur(18px) saturate(180%);
    filter: url(#glass-distortion);
    z-index: -1;
  }
  #panel::after,
  #mapModeBtn::after,
  #errorBanner::after,
  .chip::after,
  #modelFilterBtn::after,
  #modelDropdown::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.55) 0%, transparent 32%, transparent 68%, rgba(255,255,255,0.28) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  /* keep real content above the glass layers */
  #panel > * { position: relative; z-index: 1; }
  #mapModeBtn, #errorBanner, .chip, #modelFilterBtn { isolation: isolate; }

  /* dropdown is tall + scrollable — combining backdrop-filter with the SVG
     distortion on one element causes Chromium to only blur part of it, so
     give it a plain (undistorted) blur instead */
  #modelDropdown::before {
    filter: none;
  }

  /* glass-matched scrollbar for the model dropdown */
  #modelDropdownList { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.35) transparent; }
  #modelDropdownList::-webkit-scrollbar { width: 7px; }
  #modelDropdownList::-webkit-scrollbar-track { background: transparent; }
  #modelDropdownList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.28); border-radius: 10px; }
  #modelDropdownList::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.45); }

  /* custom liquid-glass checkboxes in the model dropdown */
  #modelDropdown input[type="checkbox"] {
    -webkit-appearance: none; appearance: none;
    width: 17px; height: 17px; flex: none;
    border-radius: 5px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    position: relative;
    transition: background .15s ease, border-color .15s ease;
  }
  #modelDropdown input[type="checkbox"]:hover { border-color: rgba(255,255,255,0.55); }
  #modelDropdown input[type="checkbox"]:checked {
    background: linear-gradient(135deg, var(--bus), var(--troll));
    border-color: transparent;
  }
  #modelDropdown input[type="checkbox"]:checked::after {
    content: "";
    position: absolute; left: 5px; top: 2px;
    width: 4px; height: 8px;
    border: solid #04121c;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  /* glow on the type dots + live status dot */
  #chipTroll .dot { box-shadow: 0 0 8px var(--troll), 0 0 2px var(--troll); }
  #chipTram  .dot { box-shadow: 0 0 8px var(--tram), 0 0 2px var(--tram); }
  #chipBus   .dot { box-shadow: 0 0 8px var(--bus), 0 0 2px var(--bus); }
  #chipNight .dot { box-shadow: 0 0 8px var(--night), 0 0 2px var(--night); }
  #statusDot.ok { box-shadow: 0 0 10px #ff4d4d, 0 0 3px #ff4d4d; }

  /* readable text once the light map mode is active */
  body.light-mode { --text: #14181f; --text-dim: #40474f; }
  body.light-mode #panel,
  body.light-mode #mapModeBtn,
  body.light-mode #errorBanner,
  body.light-mode .chip,
  body.light-mode #modelFilterBtn,
  body.light-mode #modelDropdown {
    background: rgba(255,255,255,0.5);
  }
  body.light-mode .field input[type="text"] {
    background: rgba(255,255,255,0.55);
    color: var(--text);
  }
  body.light-mode .field input[type="text"]::placeholder { color: #5b6570; }

  body.light-mode #modelDropdownList { scrollbar-color: rgba(0,0,0,0.35) transparent; }
  body.light-mode #modelDropdownList::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.28); }
  body.light-mode #modelDropdownList::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.45); }
  body.light-mode #modelDropdown input[type="checkbox"] {
    background: rgba(255,255,255,0.5);
    border-color: rgba(0,0,0,0.3);
  }
  body.light-mode #modelDropdown input[type="checkbox"]:hover { border-color: rgba(0,0,0,0.55); }

  /* satelliitvaates olgu ülemine paneel sama tume kui sõidukite andmete kastid (popup) */
  body.satellite-mode #panel,
  body.satellite-mode #mapModeBtn,
  body.satellite-mode #errorBanner,
  body.satellite-mode .chip,
  body.satellite-mode #modelFilterBtn,
  body.satellite-mode #modelDropdown {
    background: rgba(18,21,27,0.55);
  }

  /* hele kaart: sõidukite andmete kastid sama heledad kui ülemine paneel, ääred tumedamad (helel äärel poleks kontrasti) */
  body.light-mode .leaflet-popup-content-wrapper {
    background: rgba(255,255,255,0.55);
    border-color: rgba(0,0,0,0.22);
  }
  body.light-mode .leaflet-popup-tip {
    background: rgba(255,255,255,0.8);
  }

  /* helel kaardil olgu kõikjal tumedam, nähtavam äär, mitte hele nagu tumedal kaardil */
  body.light-mode #panel,
  body.light-mode #mapModeBtn,
  body.light-mode #errorBanner,
  body.light-mode .chip,
  body.light-mode #modelFilterBtn,
  body.light-mode #modelDropdown {
    border-color: rgba(0,0,0,0.22);
  }
  body.light-mode .field input[type="text"] { border-color: rgba(0,0,0,0.22); }
  body.light-mode .brand { border-right-color: rgba(0,0,0,0.22); }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="glass-distortion" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="2" seed="7" result="noise"/>
    <feGaussianBlur in="noise" stdDeviation="2" result="softNoise"/>
    <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="20" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<div id="map"></div>

<div id="panel">
  <div class="brand">
    <img id="logoImg" src="logo.png" alt="Tallinna ÜT" onerror="this.onerror=null; this.replaceWith(Object.assign(document.createElement('span'), {className:'brand-text', textContent:'Tallinna ÜT'}));">
  </div>

  <div class="field">
    <label for="regInput">Registrinumber</label>
    <input type="text" id="regInput" placeholder="nt 3576" autocomplete="off">
  </div>

  <div class="field">
    <label for="lineInput">Liin</label>
    <input type="text" id="lineInput" placeholder="nt 50" autocomplete="off">
  </div>

  <div class="types">
    <label class="chip" id="chipTroll"><input type="checkbox" checked><span class="dot" style="background:var(--troll)"></span>Trollid</label>
    <label class="chip" id="chipTram"><input type="checkbox" checked><span class="dot" style="background:var(--tram)"></span>Trammid</label>
    <label class="chip" id="chipBus"><input type="checkbox" checked><span class="dot" style="background:var(--bus)"></span>Bussid</label>
    <label class="chip" id="chipNight"><input type="checkbox" checked><span class="dot" style="background:var(--night)"></span>Ööbussid</label>
  </div>

  <div id="secondaryControls">
    <div style="position:relative;">
      <button id="modelFilterBtn" type="button">Mudel ▾</button>
      <div id="modelDropdown"><div id="modelDropdownList"></div></div>
    </div>

    <button id="showAllBtn">Kuva kõik sõidukid</button>
  </div>

  <div class="spacer"></div>

  <div id="status"><span id="statusDot" class="pending"></span><span id="statusText">Ühendan…</span></div>
</div>

<div id="errorBanner"></div>

<button id="mapModeBtn" title="Vaheta kaardirežiimi">🛰️ Satelliitvaade</button>

<script>
(function(){

  // ---------- Config ----------
  var OWN_PROXY_URL = 'https://tlt-gps-proxy.oliver-tedvig.workers.dev';

  var GPS_URL = 'https://transport.tallinn.ee/gps.txt';
  var SOURCES = (OWN_PROXY_URL ? [OWN_PROXY_URL] : []).concat([

  var SAME_SOURCE_RETRY_DELAY_MS = 700;

  var ZOOM_DETAIL_THRESHOLD = 15;

  var COLORS = { '1': '#0060d3', '2': '#00e2b6', '3': '#ff5f26', '7': '#7a5cff' };

  // ---------- Mudelite kataloog ----------
  var MODEL_CATALOG = [
    { group: 'Bussid', models: [

      "MAN A40 Lion's City GL NG323", "MAN A78 Lion's City LE EL293", "MAN A21 Lion's City NL283",
      'Volvo 7900 Hybrid', 'BMC Procity II 12 CNG', 'BMC Procity II 18 CNG'
    ]},

    { group: 'Trammid', models: [

  ];

  // ===== TROLLI ASENDUSE TUVASTUS (ALGUS) =====
  var TROLL_SUBSTITUTE_COLOR = '#003474';

  // ============================================================
  var VEHICLE_MODELS = {
    // ---- BUSSID ----
    '1003': 'Solaris Urbino IV 18 CNG',
    '1009': 'Solaris Urbino IV 18 CNG',
    '1012': 'MAN A40 Lion\'s City GL NG323',

    '1016': 'Solaris Urbino IV 18 CNG',
    '1017': 'Solaris Urbino IV 18 CNG',

  // ---------- State ----------

  function shapeSVG(color, hasHeading) {
    if (!hasHeading) {
      return '<svg width="16" height="16" viewBox="0 0 16 16">' +
             '<circle cx="8" cy="8" r="6" fill="' + color + '" stroke="#0a0c10" stroke-width="1.5"/>' +
             '</svg>';
    }
    // Rounded teardrop / arrow shape pointing "up" (north), rotated via wrapper transform
    return '<svg width="22" height="22" viewBox="0 0 22 22">' +
           '<path d="M11 2 C11 2 4.5 11.5 4.5 14.8 C4.5 18.5 7.4 20.5 11 20.5 C14.6 20.5 17.5 18.5 17.5 14.8 C17.5 11.5 11 2 11 2 Z" ' +
           'fill="' + color + '" stroke="#0a0c10" stroke-width="1.4" stroke-linejoin="round"/>' +
           '</svg>';
  }

  function makeIcon(color, heading) {
    var hasHeading = (heading !== null && heading !== 999 && !isNaN(heading));
    var rot = hasHeading ? heading : 0;
    var html = '<div class="veh-shape" style="transform:rotate(' + rot + 'deg);">' + shapeSVG(color, hasHeading) + '</div>';
    return L.divIcon({
      className: 'veh-icon',
      html: html,
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });

  function angleLerpTarget(oldDeg, newDeg) {
    var d = ((newDeg - oldDeg + 540) % 360) - 180;
    return oldDeg + d;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function hexToRgb(hex) {
    var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : { r: 153, g: 153, b: 153 };
  }

  function vehGlowBackground(hex) {
    var c = hexToRgb(hex);
    var rgb = c.r + ',' + c.g + ',' + c.b;
    // täielikult veh-photo-wrap kasti sees hägustuv valgusrõngas, mis ei saa
    // kunagi ülemise kaardi serva pealt maha lõigatud
    return 'radial-gradient(ellipse 52% 48% at center, ' +
           'rgba(' + rgb + ',0.22) 0%, ' +
           'rgba(' + rgb + ',0.1) 40%, ' +
           'rgba(' + rgb + ',0.03) 65%, ' +
           'rgba(' + rgb + ',0) 82%)';
  }

  function vehGlowFilter(hex) {
    var c = hexToRgb(hex);
    var rgb = c.r + ',' + c.g + ',' + c.b;
    // õhuke, teravam ääreglow otse sõiduki siluetil, mis toetab tagumist hägust kihti
    return 'drop-shadow(0 0 1.5px rgba(' + rgb + ',0.4)) ' +
           'drop-shadow(0 0 4px rgba(' + rgb + ',0.18))';
  }

  function popupHTML(d) {
    var isSub = isTrollSubstitute(d);
    var color = isSub ? TROLL_SUBSTITUTE_COLOR : (COLORS[d.type] || '#999');
    var name = isSub ? TROLL_SUBSTITUTE_LABEL : (TYPE_NAMES[d.type] || 'Sõiduk');
    var dest = d.destination && d.destination.trim() !== '' ? d.destination.trim() : '—';
    var model = d.model || 'Teadmata';
    var img = '';
    if (model !== 'Teadmata') {
      var imgSrc = 'Pildid/' + encodeURIComponent(model) + '.png';
      img = '<div class="veh-photo-wrap">' +
              '<div class="veh-photo-glow" style="background: ' + vehGlowBackground(color) + '"></div>' +
              '<img class="veh-photo" src="' + imgSrc + '" alt="' + escapeHtml(model) + '" ' +
              'style="filter: ' + vehGlowFilter(color) + '" ' +
              'onerror="this.parentElement.style.display=\'none\'">' +
            '</div>';
    }
    return '' +
      img +
      '<div class="popup-title"><span class="dot" style="background:' + color + '; box-shadow: 0 0 8px ' + color + ', 0 0 3px ' + color + ';"></span>' + name + ' &middot; liin ' + d.line + '</div>' +
      '<div class="popup-row"><span>Mudel</span><b>' + escapeHtml(model) + '</b></div>' +
      '<div class="popup-row"><span>Suund / lõpp-peatus</span><b>' + escapeHtml(dest) + '</b></div>' +
      '<div class="popup-row"><span>Registrinumber</span><b>' + escapeHtml(d.reg) + '</b></div>';
  }

  function passesFilter(d) {
    if (!filters.types[d.type]) return false;
    if (filters.reg && d.reg.toLowerCase() !== filters.reg) return false;
    if (filters.line && d.line.toLowerCase() !== filters.line) return false;
    if (filters.models.size > 0 && !filters.models.has(d.model)) return false;
    return true;
  }

  var viewportPadded = null; // vahemällu, uuendatakse move/zoom korral
  function refreshViewportCache() {
    viewportPadded = map.getBounds().pad(0.25);
  }

  function shouldRender(d) {
    if (!passesFilter(d)) return false;
    if (map.getZoom() < ZOOM_DETAIL_THRESHOLD) return true;
    if (!viewportPadded) refreshViewportCache();
    return viewportPadded.contains([d.lat, d.lon]);
  }

  // ---------- Shared animation loop ----------
  var activeEntries = new Set();
  var tickHandle = null;

  function scheduleTick() {
    if (tickHandle === null) tickHandle = requestAnimationFrame(runAnimTick);
  }

  function runAnimTick(ts) {
    tickHandle = null;
    activeEntries.forEach(function(entry) {
      var st = entry.animState;
      if (!st) { activeEntries.delete(entry); return; }
      if (!st.start) st.start = ts;
      var t = Math.min(1, (ts - st.start) / ANIM_MS);
      var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      var lat = st.fromLat + (st.toLat - st.fromLat) * ease;
      var lon = st.fromLon + (st.toLon - st.fromLon) * ease;
      entry.marker.setLatLng([lat, lon]);
      if (st.fromHeading !== null && st.toHeading !== null && st.shapeEl) {
        var heading = st.fromHeading + (st.toHeading - st.fromHeading) * ease;
        st.shapeEl.style.transform = 'rotate(' + heading + 'deg)';
      }
      if (t >= 1) {
        entry.animState = null;
        activeEntries.delete(entry);
      }
    });
    if (activeEntries.size > 0) scheduleTick();
  }

  function snapAllAnimationsToFinal() {
    activeEntries.forEach(function(entry) {
      var st = entry.animState;
      if (st) {
        entry.marker.setLatLng([st.toLat, st.toLon]);
        if (st.shapeEl && st.toHeading !== null) {
          st.shapeEl.style.transform = 'rotate(' + st.toHeading + 'deg)';
        }
      }
      entry.animState = null;
    });
    activeEntries.clear();
    if (tickHandle !== null) { cancelAnimationFrame(tickHandle); tickHandle = null; }
  }

  function animateMarker(entry, fromLat, fromLon, toLat, toLon, fromHeading, toHeadingTarget) {
    var el = entry.marker.getElement();
    var shapeEl = el ? el.querySelector('.veh-shape') : null;
    entry.animState = {
      fromLat: fromLat, fromLon: fromLon, toLat: toLat, toLon: toLon,
      fromHeading: fromHeading, toHeading: toHeadingTarget,
      start: null, shapeEl: shapeEl
    };
    activeEntries.add(entry);
    scheduleTick();
  }

  function upsertVehicle(d) {
    var id = d.reg;
    var visible = shouldRender(d);
    var existing = vehicles[id];

    if (!existing) {
      var iconColor = isTrollSubstitute(d) ? TROLL_SUBSTITUTE_COLOR : (COLORS[d.type] || '#999');
      var icon = makeIcon(iconColor, d.headingNum);
      var marker = L.marker([d.lat, d.lon], { icon: icon, riseOnHover: true });
      marker.bindPopup(popupHTML(d), { closeButton: false });
      if (visible) marker.addTo(map);
      vehicles[id] = {
        marker: marker,
        data: d,
        lat: d.lat, lon: d.lon,
        headingDeg: (d.headingNum !== null && d.headingNum !== 999) ? d.headingNum : 0,
        animState: null
      };
      return;
    }

    // update data + popup content
    existing.data = d;
    if (existing.marker.isPopupOpen()) {
      existing.marker.setPopupContent(popupHTML(d));
    } else {
      existing.marker.getPopup() && existing.marker.setPopupContent(popupHTML(d));
    }

    var wasVisible = map.hasLayer(existing.marker);
    if (visible && !wasVisible) existing.marker.addTo(map);
    if (!visible && wasVisible) map.removeLayer(existing.marker);

    var hasHeading = (d.headingNum !== null && d.headingNum !== 999 && !isNaN(d.headingNum));
    var targetHeading = hasHeading ? angleLerpTarget(existing.headingDeg, d.headingNum) : existing.headingDeg;

    var animate = visible && (map.getZoom() >= ZOOM_DETAIL_THRESHOLD);

    if (animate) {
      animateMarker(existing, existing.lat, existing.lon, d.lat, d.lon, existing.headingDeg, targetHeading);
    } else {
      existing.marker.setLatLng([d.lat, d.lon]);
      var el = existing.marker.getElement();
      var shapeEl = el ? el.querySelector('.veh-shape') : null;
      if (shapeEl && targetHeading !== null) shapeEl.style.transform = 'rotate(' + targetHeading + 'deg)';
    }

    existing.lat = d.lat;
    existing.lon = d.lon;
    existing.headingDeg = ((targetHeading % 360) + 360) % 360;
  }

  function pruneMissing(seenIds) {
    for (var id in vehicles) {
      if (!seenIds[id]) {
        var v = vehicles[id];
        if (v.animState) { activeEntries.delete(v); v.animState = null; }
        map.removeLayer(v.marker);
        delete vehicles[id];
      }
    }
  }

  function reapplyAllFilters() {
    refreshViewportCache();
    for (var id in vehicles) {
      var v = vehicles[id];
      var visible = shouldRender(v.data);
      var isOn = map.hasLayer(v.marker);
      if (visible && !isOn) v.marker.addTo(map);
      if (!visible && isOn) map.removeLayer(v.marker);
    }
  }

  // ---------- Parsing ----------
  function parseGPS(text) {
    var lines = text.split('\n');
    var seen = {};
    var counts = { '1': 0, '2': 0, '3': 0, '7': 0 };
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var parts = line.split(',');
      if (parts.length < 9) continue;

      var type = parts[0].trim();
      if (!COLORS[type]) continue;

      var lineNum = parts[1].trim();
      var lonRaw = parseFloat(parts[2]);
      var latRaw = parseFloat(parts[3]);
      if (isNaN(lonRaw) || isNaN(latRaw) || lonRaw === 0 || latRaw === 0) continue;
      var lon = lonRaw / 1000000;
      var lat = latRaw / 1000000;
      var speed = parts[4].trim();
      var headingNum = parseInt(parts[5], 10);
      var reg = parts[6].trim();
      var destination = parts.length > 9 ? parts.slice(9).join(',').trim() : '';

      if (!reg) continue;

      var d = {
        type: type, line: lineNum, lat: lat, lon: lon,
        speed: speed, headingNum: isNaN(headingNum) ? null : headingNum,
        reg: reg, destination: destination,
        model: VEHICLE_MODELS[reg] || 'Teadmata'
      };

      seen[reg] = true;
      counts[type]++;
      upsertVehicle(d);
    }
    pruneMissing(seen);
    return counts;
  }

  // ---------- Fetching ----------
  var statusDot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  var errorBanner = document.getElementById('errorBanner');

  function setStatus(kind, msg) {
    statusDot.className = kind;
    statusText.textContent = msg;
  }

  function isValidGPSText(text) {
    if (!text) return false;
    var lines = text.split('\n');
    var valid = 0;
    for (var i = 0; i < lines.length && i < 60; i++) {
      var l = lines[i].trim();
      if (!l) continue;
      // type,line,lon(6-8 digits),lat(6-8 digits), ...
      if (/^\d,[^,]*,\d{6,9},\d{6,9},/.test(l)) valid++;
    }
    return valid >= 5;
  }

  async function fetchWithTimeout(url, ms) {
    var controller = new AbortController();
    var timer = setTimeout(function(){ controller.abort(); }, ms);
    try {
      var res = await fetch(url, { cache: 'no-store', signal: controller.signal });
      return res;
    } finally {
      clearTimeout(timer);
    }
  }

  function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

  async function tryFetchSource(idx) {
    var res = await fetchWithTimeout(SOURCES[idx], FETCH_TIMEOUT_MS);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    if (!isValidGPSText(text)) throw new Error('Vale vormingus vastus');
    return text;
  }

  async function fetchGPSText() {
    var order = [workingSourceIndex].concat(SOURCES.map(function(_, i){return i;}).filter(function(i){return i !== workingSourceIndex;}));
    var lastErr = null;
    for (var k = 0; k < order.length; k++) {
      var idx = order[k];
      var attempts = (idx === workingSourceIndex) ? (1 + SAME_SOURCE_RETRIES) : 1;
      for (var a = 0; a < attempts; a++) {
        try {
          var text = await tryFetchSource(idx);
          workingSourceIndex = idx;
          return text;
        } catch (e) {
          lastErr = e;
          if (a < attempts - 1) await sleep(SAME_SOURCE_RETRY_DELAY_MS);
        }
      }
    }
    throw lastErr || new Error('Andmeid ei õnnestunud laadida');
  }

  var pollCount = 0;
  async function poll() {
    setStatus('pending', 'Uuendan…');
    try {
      var text = await fetchGPSText();
      var counts = parseGPS(text);
      errorBanner.style.display = 'none';
      pollCount++;
      var total = counts['1'] + counts['2'] + counts['3'] + counts['7'];
      var now = new Date();
      var hh = String(now.getHours()).padStart(2,'0');
      var mm = String(now.getMinutes()).padStart(2,'0');
      var ss = String(now.getSeconds()).padStart(2,'0');
      var breakdown = counts['1'] + ' trolli \u00b7 ' + counts['3'] + ' trammi \u00b7 ' + counts['2'] + ' bussi \u00b7 ' + counts['7'] + ' ööbussi';
      setStatus('ok', 'LIVE \u00b7 ' + total + ' sõidukit (' + breakdown + ') \u00b7 ' + hh + ':' + mm + ':' + ss);
    } catch (e) {
      setStatus('bad', 'Ühendus ebaõnnestus');
      errorBanner.style.display = 'block';
      errorBanner.textContent = OWN_PROXY_URL
        ? 'ERROR: Ei õnnestunud andmeid laadida, kirjuta Oliverile.'
        : 'Avalikud vaheserverid on hetkel ülekoormatud. Proovin uuesti automaatselt — stabiilseima tulemuse saad oma Cloudflare Worker proxyga (vt worker.js).';
    }
    setTimeout(poll, POLL_MS);
  }

  // ---------- Filter UI wiring ----------
  var regInput = document.getElementById('regInput');
  var lineInput = document.getElementById('lineInput');

  function autoSelectIfSingleMatch() {
    var onlyMatch = null;
    var count = 0;
    for (var id in vehicles) {
      var v = vehicles[id];
      if (passesFilter(v.data)) {
        count++;
        onlyMatch = v;
        if (count > 1) return;
      }
    }
    if (count === 1 && onlyMatch) {
      map.flyTo([onlyMatch.lat, onlyMatch.lon], Math.max(map.getZoom(), 17), { duration: 0.6 });
      onlyMatch.marker.openPopup();
    }
  }

  regInput.addEventListener('input', function() {
    filters.reg = regInput.value.trim().toLowerCase();
    reapplyAllFilters();
    autoSelectIfSingleMatch();
  });
  lineInput.addEventListener('input', function() {
    filters.line = lineInput.value.trim().toLowerCase();
    reapplyAllFilters();
    autoSelectIfSingleMatch();
  });

  // Sõidukitüübi kiipe klõpsates NÄIDATAKSE ainult seda tüüpi (isoleeriv valik),
  // mitte ei lülitata seda lihtsalt teiste seast välja. "Kuva kõik sõidukid" taastab kõik korraga.
  var CHIP_TYPE_MAP = { chipTroll: '1', chipTram: '3', chipBus: '2', chipNight: '7' };

  function wireChip(chipId, typeKey) {
    var chip = document.getElementById(chipId);
    chip.addEventListener('click', function(e) {
      e.preventDefault();
      Object.keys(CHIP_TYPE_MAP).forEach(function(id) {
        var key = CHIP_TYPE_MAP[id];
        var isActive = (key === typeKey);
        filters.types[key] = isActive;
        var c = document.getElementById(id);
        c.querySelector('input').checked = isActive;
        c.classList.toggle('off', !isActive);
      });
      reapplyAllFilters();
      autoSelectIfSingleMatch();
    });
  }
  wireChip('chipTroll', '1');
  wireChip('chipTram', '3');
  wireChip('chipBus', '2');
  wireChip('chipNight', '7');

  document.getElementById('showAllBtn').addEventListener('click', showAll);

  // ---------- Kaardirežiimid: satelliit / tume / hele, tsükliliselt ühe nupuga ----------
  var MAP_MODES = [
    { key: 'satellite', label: '🛰️ Satelliitvaade', layer: satelliteLayer, darkFilter: false },
    { key: 'dark',      label: '🌑 Tume režiim',      layer: darkLayer,      darkFilter: true  },
    { key: 'light',     label: '☀️ Hele režiim',      layer: lightLayer,     darkFilter: false }
  ];
  var currentModeIndex = 0;

  function applyMapMode(idx) {
    var mapEl = document.getElementById('map');
    MAP_MODES.forEach(function(m, i) {
      if (i !== idx && map.hasLayer(m.layer)) map.removeLayer(m.layer);
    });
    var mode = MAP_MODES[idx];
    if (!map.hasLayer(mode.layer)) mode.layer.addTo(map);
    mapEl.classList.toggle('dark-mode', mode.darkFilter);
    document.body.classList.toggle('light-mode', mode.key === 'light');
    document.body.classList.toggle('satellite-mode', mode.key === 'satellite');
    document.getElementById('mapModeBtn').textContent = mode.label;
    currentModeIndex = idx;
  }

  document.getElementById('mapModeBtn').addEventListener('click', function() {
    applyMapMode((currentModeIndex + 1) % MAP_MODES.length);
  });

  function showAll() {
    regInput.value = '';
    lineInput.value = '';
    filters.reg = '';
    filters.line = '';
    filters.types = { '1': true, '2': true, '3': true, '7': true };
    ['chipTroll','chipBus','chipNight','chipTram'].forEach(function(id){
      var chip = document.getElementById(id);
      chip.querySelector('input').checked = true;
      chip.classList.remove('off');
    });
    clearModelSelection();
    reapplyAllFilters();
  }

  // ---------- Mudeli filtri dropdown ----------
  var modelDropdown = document.getElementById('modelDropdown');
  var modelDropdownList = document.getElementById('modelDropdownList');
  var modelFilterBtn = document.getElementById('modelFilterBtn');

  (function buildModelDropdown() {
    var html = '';
    MODEL_CATALOG.forEach(function(group) {
      html += '<div class="group-title">' + escapeHtml(group.group) + '</div>';
      group.models.forEach(function(model) {
        var mid = 'mdl_' + model.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<label><input type="checkbox" data-model="' + escapeHtml(model) + '" id="' + mid + '">' + escapeHtml(model) + '</label>';
      });
    });
    html += '<div class="clear-models" id="clearModelsBtn">Puhasta mudelivalik</div>';
    modelDropdownList.innerHTML = html;

    modelDropdownList.querySelectorAll('input[data-model]').forEach(function(box) {
      box.addEventListener('change', function() {
        var model = box.getAttribute('data-model');
        if (box.checked) filters.models.add(model);
        else filters.models.delete(model);
        updateModelButtonLabel();
        reapplyAllFilters();
        autoSelectIfSingleMatch();
      });
    });
    document.getElementById('clearModelsBtn').addEventListener('click', function() {
      clearModelSelection();
      reapplyAllFilters();
    });
  })();

  function clearModelSelection() {
    filters.models.clear();
    modelDropdownList.querySelectorAll('input[data-model]').forEach(function(box){ box.checked = false; });
    updateModelButtonLabel();
  }

  function updateModelButtonLabel() {
    var n = filters.models.size;
    modelFilterBtn.textContent = (n > 0 ? ('Mudel (' + n + ') ▾') : 'Mudel ▾');
    modelFilterBtn.classList.toggle('active-filter', n > 0);
  }

  modelFilterBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    modelDropdown.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!modelDropdown.contains(e.target) && e.target !== modelFilterBtn) {
      modelDropdown.classList.remove('open');
    }
  });
  modelDropdown.addEventListener('click', function(e) { e.stopPropagation(); });

  // ---------- Mobiilivaates "Mudel/Puhasta otsing/Kuva kõik" alla ----------
  (function setupSecondaryControlsRelocation() {
    var secCtrl = document.getElementById('secondaryControls');
    var anchor = document.createComment('secondaryControls-anchor');
    secCtrl.parentNode.insertBefore(anchor, secCtrl);
    var mq = window.matchMedia('(max-width: 720px)');

    function relocate() {
      if (mq.matches) {
        if (secCtrl.parentNode !== document.body) document.body.appendChild(secCtrl);
      } else {
        if (secCtrl.parentNode !== anchor.parentNode) anchor.parentNode.insertBefore(secCtrl, anchor.nextSibling);
      }
    }
    relocate();
    if (mq.addEventListener) mq.addEventListener('change', relocate);
    else mq.addListener(relocate); // Safari legacy fallback
  })();

  // Initial state: show all vehicles on load
  applyMapMode(0); // vaikimisi: satelliitvaade
  showAll();
  poll();

})();
</script>
</body>
</html>
